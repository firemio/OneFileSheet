<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One File Sheet</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --border: #d9d9de;
    --accent: #2563eb;
    --head-bg: #f4f4f5;
    --coord-bg: #ececef;
    --coord-fg: #6b6b74;
    --hover: rgba(37, 99, 235, 0.06);
    --status: #555;
    --ok: #15803d;
    --warn: #b45309;
    --btn-bg: #ffffff;
    --btn-border: #c8c8cd;
    --menu-shadow: rgba(0, 0, 0, 0.15);
  }
  /* テーマの実体は app-code の THEME_LIST から JS がCSS変数を導出して適用する。
     以下はJS実行前の初期描画用フォールバック */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --fg: #e6e6e6;
      --border: #3a3a3a;
      --accent: #60a5fa;
      --head-bg: #2a2a2a;
      --coord-bg: #262626;
      --coord-fg: #9a9aa2;
      --hover: rgba(96, 165, 250, 0.08);
      --status: #aaa;
      --ok: #4ade80;
      --warn: #fbbf24;
      --btn-bg: #2a2a2a;
      --btn-border: #454545;
      --menu-shadow: rgba(0, 0, 0, 0.5);
    }
  }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    margin: 16px 20px;
    background: var(--bg);
    color: var(--fg);
  }
  .topbar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .topbar .sep { width: 6px; }
  #doc-title {
    margin: 0 8px 0 0;
    font-size: 17px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: text;
    white-space: pre;
  }
  #doc-title:hover { background: var(--hover); }
  #doc-title:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  #file-path {
    margin-left: auto;
    color: var(--status);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 38%;
  }
  #help-pop {
    position: fixed;
    z-index: 10;
    max-width: 440px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
    font-size: 13px;
  }
  #help-pop[hidden] { display: none; }
  #help-pop ul { margin: 6px 0 0; padding-left: 18px; }
  #help-pop li { margin: 4px 0; }
  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 12px;
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--fg);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button svg { display: block; }
  button svg[hidden] { display: none; }
  .topbar button { padding: 7px 9px; }
  #theme-pop {
    position: fixed;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    width: 420px;
    max-width: calc(100vw - 24px);
    max-height: 70vh;
    overflow: auto;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
  }
  #theme-pop[hidden] { display: none; }
  #theme-pop .theme-item {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    padding: 5px 8px;
    border: 1px solid transparent;
    background: none;
    border-radius: 6px;
    font-size: 12px;
    color: var(--fg);
  }
  #theme-pop .theme-item:hover { background: var(--hover); }
  #theme-pop .theme-item.active { border-color: var(--accent); }
  #theme-pop .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    flex: none;
  }
  #save-status { margin-left: 6px; color: var(--status); font-size: 13px; cursor: pointer; }
  #save-status:hover { color: var(--accent); text-decoration: underline; }
  #lang-btn { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; min-width: 34px; }
  #sheet-tabs .tab[contenteditable] { cursor: text; outline: 2px solid var(--accent); outline-offset: -2px; }
  #save-status.ok { color: var(--ok); }
  #save-status.warn { color: var(--warn); }
  .sheet-wrap {
    overflow: auto;
    max-height: 72vh;
    max-width: 100%;
    width: fit-content;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  table { border-collapse: separate; border-spacing: 0; }
  td, th {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px 6px;
    font-size: 14px;
    text-align: left;
  }
  tr:last-child td, tr:last-child th { border-bottom: none; }
  td:last-child, th:last-child { border-right: none; }
  .cell {
    min-width: 120px;
    max-width: 360px;
    height: 28px;
    cursor: text;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  th.cell { background: var(--head-bg); font-weight: 600; }
  .cell:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  tr:hover td.cell { background: var(--hover); }
  th.coord {
    background: var(--coord-bg);
    color: var(--coord-fg);
    font-weight: 500;
    font-size: 12px;
    text-align: center;
    padding: 2px 8px;
    cursor: pointer;
    user-select: none;
    min-width: 28px;
  }
  th.coord:hover { color: var(--accent); }
  th.col-head, th.corner { position: sticky; top: 0; z-index: 2; }
  th.row-head, th.corner { position: sticky; left: 0; }
  th.corner { z-index: 3; cursor: default; }
  th.row-head { z-index: 1; }
  #sheet-tabs {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 2px;
    margin-top: 12px;
    margin-bottom: -1px;
    padding: 0 6px;
    position: relative;
    z-index: 1;
  }
  #sheet-tabs .tab {
    padding: 5px 16px;
    background: var(--coord-bg);
    color: var(--status);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  #sheet-tabs .tab.active {
    background: var(--bg);
    color: var(--fg);
    font-weight: 600;
    box-shadow: 0 1px 0 var(--bg);
  }
  #sheet-tabs .add-sheet {
    padding: 4px 10px;
    margin-left: 4px;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  #ctx-menu {
    position: fixed;
    z-index: 10;
    display: flex;
    flex-direction: column;
    min-width: 150px;
    padding: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
  }
  #ctx-menu[hidden] { display: none; }
  #ctx-menu button {
    border: none;
    background: none;
    border-radius: 5px;
    padding: 6px 10px;
    justify-content: flex-start;
    text-align: left;
    font-size: 13px;
    color: var(--fg);
  }
  #ctx-menu button:hover { background: var(--hover); color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <h2 id="doc-title" title="クリックでタイトルを編集">One File Sheet</h2>
  <button id="save-btn" onclick="saveToSameFile()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  </button>
  <button id="reload-btn" onclick="reloadFromFile()">

  <span class="sep"></span>

  </button>
  <span class="sep"></span>
  <span id="save-status">保存先未設定</span>
  <span id="file-path"></span>
  <button id="export-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button id="help-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </button>
  <button id="lang-btn"></button>
  <button id="theme-btn">
    <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    <svg id="theme-icon-moon" hidden width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
  </button>
</div>

<div id="help-pop" hidden></div>

<div id="theme-pop" hidden></div>

<div id="sheet-tabs"></div>

<div class="sheet-wrap">
  <table id="sheet"></table>
</div>

<div id="ctx-menu" hidden></div>

<!--
AGENT NOTES — contract for AI/coding agents editing this file:
- The spreadsheet document lives ONLY in the JSON block directly below this
  comment: the script element with id "sheet-data" (type application/json).
  Everything else in this file is application code/UI.
- Document format (v2):
  { "title": string, "theme": "auto" or a theme id from THEME_LIST in the
    app code (32 built-in themes),
    "lang": "auto"|"en"|"ja" (UI language; "auto" follows the browser),
    "activeSheet": number, "sheets": [ { "name": string, "data": [[...]] } ] }
  Each sheet's data is a JSON 2D array of strings; data[0] is that sheet's
  header row. All rows in a sheet have equal length (the app pads ragged rows
  on load). Cells are plain strings; numbers are coerced to strings.
  A legacy bare 2D array is still accepted on load and migrates to v2 on the
  next save.
- Keep the formatting produced by JSON.stringify(doc, null, 2): 2-space
  indent, LF line endings. This keeps saves diff-stable.
- Do NOT rename, duplicate, or reformat the opening tag of the sheet-data
  block. The app locates the block with a regex keyed on id="sheet-data";
  extra attributes are tolerated but the id must stay.
- If a cell value contains "<", write it as \u003c in the JSON so the block
  cannot terminate early. Cell newlines are stored as \n. The in-app save
  applies this escaping automatically.
- Co-editing semantics: the browser app keeps the document in memory. Saving
  from the browser re-reads this file from disk and rewrites ONLY the
  sheet-data block, so code edits elsewhere in the file survive a user save.
  If you change the JSON while the file is open in a browser, the user should
  press 再読み込み before saving; the app also warns when the on-disk block
  changed after load.
- App code lives in the script element with id "app-code" at the end of body.
  Entry points: render(), reloadFromFile(), saveToSameFile(), exportHtml(),
  exportCsv(), initialize(). UI strings live in the MESSAGES catalog (en/ja);
  keep identifiers English.
-->

<script id="sheet-data" type="application/json">
{
  "title": "One File Sheet",
  "theme": "auto",
  "lang": "auto",
  "activeSheet": 0,
  "sheets": [
    {
      "name": "Sheet1",

        [

        ],

          "Bob",

          ""
        ]
      ]

  ]
}
</script>

function effLang() {
  const chosen = typeof doc !== "undefined" && doc ? doc.lang : "auto";
  if (chosen === "en" || chosen === "ja") return chosen;
  return (navigator.language || "en").toLowerCase().startsWith("ja") ? "ja" : "en";
}

function t(key) {
  const lang = effLang();
  return (MESSAGES[lang] && MESSAGES[lang][key]) || MESSAGES.en[key] || key;
}

// id で照合するので属性の順序変更や追加には耐える。アプリ本体のソースには
// このパターンに一致するタグ列が現れないよう、生成側はタグを分割して持つ。
const SHEET_DATA_RE = /<script\b[^>]*\bid=["']sheet-data["'][^>]*>([\s\S]*?)<\/script>/;
const OPEN_TAG = '<scr' + 'ipt id="sheet-data" type="application/json">';

  alert(t("bootBroken1") + error.message + t("bootBroken2"));
  doc = normalizeDoc([[""]]);
}

function normalizeData(value) {
  if (!Array.isArray(value) || value.length === 0) return [[""]];
  const rows = value.map(row => (Array.isArray(row) ? row : [row]));
  const width = Math.max(1, ...rows.map(row => row.length));
  return rows.map(row =>
    Array.from({ length: width }, (_, i) => (row[i] == null ? "" : String(row[i])))
  );
}

function normalizeDoc(parsed) {
  let title = "One File Sheet";
  let theme = "auto";
  let lang = "auto";
  let activeSheet = 0;
  let sheets;

  if (Array.isArray(parsed)) {
    sheets = [{ name: "Sheet1", data: parsed }];
  } else if (parsed && typeof parsed === "object" && Array.isArray(parsed.sheets)) {
    if (typeof parsed.title === "string" && parsed.title.trim()) title = parsed.title.trim();
    if (parsed.theme === "auto" || THEME_MAP[parsed.theme]) theme = parsed.theme;
    if (parsed.lang === "en" || parsed.lang === "ja") lang = parsed.lang;
    sheets = parsed.sheets;
    activeSheet = parsed.activeSheet;
  } else {
    throw new Error("not a sheet document");
  }

  if (sheets.length === 0) sheets = [{ name: "Sheet1", data: [[""]] }];
  const normSheets = sheets.map((s, i) => ({
    name: s && typeof s.name === "string" && s.name.trim() ? s.name.trim() : "Sheet" + (i + 1),
    data: normalizeData(s ? s.data : null),
  }));
  if (!Number.isInteger(activeSheet) || activeSheet < 0 || activeSheet >= normSheets.length) {
    activeSheet = 0;
  }
  return { title: title, theme: theme, lang: lang, activeSheet: activeSheet, sheets: normSheets };
}

function syncData() {
  data = doc.sheets[doc.activeSheet].data;
}

function colCount() {
  return data[0] ? data[0].length : 0;
}

function colLetter(c) {
  let s = "";
  let n = c;
  do {
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return s;
}

const darkMq = window.matchMedia("(prefers-color-scheme: dark)");
darkMq.addEventListener("change", applyTheme);

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function mix(a, b, t) {
  const A = hexToRgb(a);
  const B = hexToRgb(b);
  return "rgb(" + A.map((v, i) => Math.round(v + (B[i] - v) * t)).join(",") + ")";
}

function rgba(hex, alpha) {
  const [r, g, b] = hexToRgb(hex);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function isDarkColor(hex) {
  const [r, g, b] = hexToRgb(hex);
  return 0.2126 * r + 0.7152 * g + 0.0722 * b < 128;
}

function themeVars(theme) {
  const dark = isDarkColor(theme.bg);
  return {
    "--bg": theme.bg,
    "--fg": theme.fg,
    "--accent": theme.accent,
    "--border": mix(theme.bg, theme.fg, 0.17),
    "--head-bg": mix(theme.bg, theme.fg, 0.05),
    "--coord-bg": mix(theme.bg, theme.fg, 0.08),
    "--coord-fg": mix(theme.fg, theme.bg, 0.45),
    "--hover": rgba(theme.accent, 0.08),
    "--status": mix(theme.fg, theme.bg, 0.35),
    "--ok": dark ? "#4ade80" : "#15803d",
    "--warn": dark ? "#fbbf24" : "#b45309",
    "--btn-bg": mix(theme.bg, theme.fg, 0.03),
    "--btn-border": mix(theme.bg, theme.fg, 0.25),
    "--menu-shadow": dark ? "rgba(0,0,0,0.55)" : "rgba(0,0,0,0.18)",
  };
}

function applyTheme() {
  const id = doc.theme === "auto" ? (darkMq.matches ? "dark" : "light") : doc.theme;
  const theme = THEME_MAP[id] || THEME_MAP.light;
  const vars = themeVars(theme);
  for (const key in vars) {
    document.documentElement.style.setProperty(key, vars[key]);
  }
  const dark = isDarkColor(theme.bg);
  // SVGElement に .hidden プロパティはないため属性で切り替える
  themeIconSun.toggleAttribute("hidden", dark);
  themeIconMoon.toggleAttribute("hidden", !dark);
  themeBtn.title = t("themePrefix") + (doc.theme === "auto" ? "Auto (" + theme.name + ")" : theme.name);
  themeBtn.setAttribute("aria-label", t("themePrefix") + theme.name);
}

function renderPath() {
  let p;
  if (location.protocol === "file:") {
    p = decodeURIComponent(location.pathname);
    if (/^\/[A-Za-z]:/.test(p)) p = p.slice(1);
  } else {
    p = location.href;
  }
  pathEl.textContent = p;
  pathEl.title = p;
}

function renderTabs() {

    b.type = "button";

    b.dataset.i = i;
    b.textContent = s.name;
    b.title = t("tabTitle");
    tabsEl.appendChild(b);

  const add = document.createElement("button");

  add.className = "add-sheet";

function render() {
  const hadFocus = table.contains(document.activeElement);
  table.innerHTML = "";

  const coordRow = document.createElement("tr");
  const corner = document.createElement("th");
  corner.className = "coord corner";
  coordRow.appendChild(corner);
  for (let c = 0; c < colCount(); c++) {
    const th = document.createElement("th");
    th.className = "coord col-head";
    th.dataset.c = c;
    th.textContent = colLetter(c);
    th.title = t("colMenuTitle");
    coordRow.appendChild(th);
  }
  table.appendChild(coordRow);

  data.forEach((row, r) => {
    const tr = document.createElement("tr");

    const rowHead = document.createElement("th");
    rowHead.className = "coord row-head";
    rowHead.dataset.r = r;
    rowHead.textContent = r + 1;
    rowHead.title = t("rowMenuTitle");
    tr.appendChild(rowHead);

    row.forEach((cell, c) => {
      const el = document.createElement(r === 0 ? "th" : "td");
      el.className = "cell";
      el.setAttribute("contenteditable", editMode);
      el.dataset.r = r;
      el.dataset.c = c;
      el.textContent = cell;
      tr.appendChild(el);
    });

    table.appendChild(tr);
  });

  if (hadFocus && activePos) {
    focusCell(activePos.r, activePos.c, "end");
  }
}

function cellAt(r, c) {
  return table.querySelector('.cell[data-r="' + r + '"][data-c="' + c + '"]');
}

function focusCell(r, c, caret) {
  r = Math.min(Math.max(r, 0), data.length - 1);
  c = Math.min(Math.max(c, 0), colCount() - 1);
  const el = cellAt(r, c);
  if (!el) return;
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  if (caret === "end") range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function markDirty() {
  dirty = true;
  refreshStatus();
}

function refreshStatus() {
  if (toastTimer) {
    clearTimeout(toastTimer);
    toastTimer = null;
  }
  statusEl.classList.remove("ok", "warn");
  const base = fileHandle ? t("target") + fileHandle.name : t("noTarget");
  statusEl.textContent = base + (dirty ? t("unsaved") : "");
  statusEl.title = t("statusChange");
  document.title = (dirty ? "● " : "") + doc.title;
}

function showToast(message, isWarn) {
  if (toastTimer) clearTimeout(toastTimer);
  statusEl.classList.remove("ok", "warn");
  statusEl.classList.add(isWarn ? "warn" : "ok");
  statusEl.textContent = message;
  toastTimer = setTimeout(() => {
    toastTimer = null;
    refreshStatus();
  }, 2500);
}

function pushUndo() {
  undoStack.push(JSON.stringify(doc));
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}

function undo() {
  hideMenu();
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(doc));
  doc = JSON.parse(undoStack.pop());
  syncDocUI();
  markDirty();
}

function redo() {
  hideMenu();
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(doc));
  doc = JSON.parse(redoStack.pop());
  syncDocUI();
  markDirty();
}

function insertRow(at) {
  pushUndo();
  data.splice(at, 0, Array(colCount()).fill(""));
  markDirty();
  render();
}

function deleteRow(at) {
  if (data.length <= 1) {
    showToast(t("lastRow"), true);
    return;
  }
  pushUndo();
  data.splice(at, 1);
  if (activePos && activePos.r >= data.length) activePos.r = data.length - 1;
  markDirty();
  render();
}

function insertCol(at) {
  pushUndo();
  data.forEach(row => row.splice(at, 0, ""));
  markDirty();
  render();
}

function deleteCol(at) {
  if (colCount() <= 1) {
    showToast(t("lastCol"), true);
    return;
  }
  pushUndo();
  data.forEach(row => row.splice(at, 1));
  if (activePos && activePos.c >= colCount()) activePos.c = colCount() - 1;
  markDirty();
  render();
}

function addRow() {
  insertRow(data.length);
}

function addCol() {
  insertCol(colCount());
}

function sheetName(base) {
  let n = doc.sheets.length + 1;
  let name = base + n;
  const names = doc.sheets.map(s => s.name);
  while (names.includes(name)) {
    n++;
    name = base + n;
  }
  return name;
}

function addSheet() {
  pushUndo();
  doc.sheets.push({
    name: sheetName("Sheet"),
    data: Array.from({ length: 4 }, () => ["", "", ""]),
  });
  doc.activeSheet = doc.sheets.length - 1;
  syncData();
  activePos = null;
  markDirty();
  renderTabs();
  render();
}

function switchSheet(i) {
  if (i === doc.activeSheet || i < 0 || i >= doc.sheets.length) return;
  doc.activeSheet = i;
  syncData();
  activePos = null;
  renderTabs();
  render();
}

// prompt() は埋め込みブラウザで抑止されることがあるため、タブ上で直接編集する
function startRenameSheet(i) {
  switchSheet(i);
  const tab = tabsEl.querySelector('.tab[data-i="' + i + '"]');
  if (!tab) return;
  const original = doc.sheets[i].name;
  tab.setAttribute("contenteditable", editMode);
  tab.focus();
  const range = document.createRange();
  range.selectNodeContents(tab);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  // blur が起きない環境でも確定できるよう、Enter/Escape でも直接 finish する
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    tab.removeAttribute("contenteditable");
    const name = tab.textContent.replace(/\n/g, " ").trim();
    if (name && name !== original) {
      pushUndo();
      doc.sheets[i].name = name;
      markDirty();
    }
    renderTabs();
  };

  tab.addEventListener("focusout", finish, { once: true });
  tab.addEventListener("keydown", e => {
    if (e.isComposing) return;
    if (e.key === "Enter") {
      e.preventDefault();
      tab.blur();
      finish();
    } else if (e.key === "Escape") {
      e.stopPropagation();
      tab.textContent = original;
      tab.blur();
      finish();
    }
  });
}

function deleteSheet(i) {
  if (doc.sheets.length <= 1) {
    showToast(t("lastSheet"), true);
    return;
  }
  pushUndo();
  doc.sheets.splice(i, 1);
  if (doc.activeSheet >= doc.sheets.length) doc.activeSheet = doc.sheets.length - 1;
  else if (doc.activeSheet > i) doc.activeSheet--;
  syncData();
  activePos = null;
  markDirty();
  renderTabs();
  render();
}

function moveSheet(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= doc.sheets.length) return;
  pushUndo();
  const [s] = doc.sheets.splice(i, 1);
  doc.sheets.splice(j, 0, s);
  if (doc.activeSheet === i) doc.activeSheet = j;
  else if (doc.activeSheet === j) doc.activeSheet = i;
  markDirty();
  renderTabs();
}

function showMenu(x, y, items) {
  menuEl.innerHTML = "";
  items.forEach(([label, action]) => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = label;
    b.onclick = () => {
      hideMenu();
      action();
    };
    menuEl.appendChild(b);
  });
  menuEl.hidden = false;
  const rect = menuEl.getBoundingClientRect();
  menuEl.style.left = Math.max(0, Math.min(x, window.innerWidth - rect.width - 8)) + "px";
  menuEl.style.top = Math.max(0, Math.min(y, window.innerHeight - rect.height - 8)) + "px";
}

function hideMenu() {
  menuEl.hidden = true;
}

function headMenuHandler(e) {
  const rowHead = e.target.closest("th.row-head");
  const colHead = e.target.closest("th.col-head");
  if (!rowHead && !colHead) return;
  e.preventDefault();
  e.stopPropagation();
  if (rowHead) {
    const r = Number(rowHead.dataset.r);
    showMenu(e.clientX, e.clientY, [
      [t("insRowAbove"), () => insertRow(r)],
      [t("insRowBelow"), () => insertRow(r + 1)],
      [t("delRow"), () => deleteRow(r)],
    ]);
  } else {
    const c = Number(colHead.dataset.c);
    showMenu(e.clientX, e.clientY, [
      [t("insColLeft"), () => insertCol(c)],
      [t("insColRight"), () => insertCol(c + 1)],
      [t("delCol"), () => deleteCol(c)],
    ]);
  }
}

function caretInfo(cell) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  if (!cell.contains(range.startContainer)) return null;
  if (!sel.isCollapsed) {
    // セル全体の選択（ナビゲーションでの select-all）だけセル移動を許可し、
    // 部分選択はブラウザ標準のキャレット操作に任せる
    if (sel.toString() === cell.textContent && cell.textContent !== "") {
      return { atStart: true, atEnd: true, onFirstLine: true, onLastLine: true };
    }
    return null;
  }
  const pre = range.cloneRange();
  pre.selectNodeContents(cell);
  pre.setEnd(range.startContainer, range.startOffset);
  const offset = pre.toString().length;
  const text = cell.textContent;
  return {
    atStart: offset === 0,
    atEnd: offset === text.length,
    onFirstLine: !text.slice(0, offset).includes("\n"),
    onLastLine: !text.slice(offset).includes("\n"),
  };
}

table.addEventListener("contextmenu", headMenuHandler);

table.addEventListener("focusin", e => {
  const cell = e.target.closest(".cell");
  if (!cell) return;
  activePos = { r: Number(cell.dataset.r), c: Number(cell.dataset.c) };
  pendingSnapshot = JSON.stringify(doc);
  cellEdited = false;
});

table.addEventListener("input", e => {
  const cell = e.target.closest(".cell");
  if (!cell) return;
  if (!cellEdited && pendingSnapshot !== null) {
    undoStack.push(pendingSnapshot);
    if (undoStack.length > 100) undoStack.shift();
    redoStack.length = 0;
    cellEdited = true;
  }
  // 末尾の "\n" は contentEditable が表示用に足すプレースホルダ改行のため1つ除去
  let value = cell.textContent;
  if (value.endsWith("\n")) value = value.slice(0, -1);
  data[Number(cell.dataset.r)][Number(cell.dataset.c)] = value;
  markDirty();
});

table.addEventListener("keydown", e => {
  if (e.isComposing) return;
  const cell = e.target.closest(".cell");
  if (!cell) return;
  const r = Number(cell.dataset.r);
  const c = Number(cell.dataset.c);

  if (e.key === "Enter") {
    if (e.altKey) {
      e.preventDefault();
      document.execCommand("insertText", false, "\n");
      return;
    }
    e.preventDefault();
    if (e.shiftKey) {
      focusCell(r - 1, c);
    } else if (r === data.length - 1) {
      insertRow(data.length);
      focusCell(r + 1, c);
    } else {
      focusCell(r + 1, c);
    }
    return;
  }

  if (e.key === "Tab") {
    // 端のセルでは preventDefault せず、フォーカスが表の外へ出られるようにする
    if (e.shiftKey) {
      if (c > 0) { e.preventDefault(); focusCell(r, c - 1); }
      else if (r > 0) { e.preventDefault(); focusCell(r - 1, colCount() - 1); }
    } else {
      if (c < colCount() - 1) { e.preventDefault(); focusCell(r, c + 1); }
      else if (r < data.length - 1) { e.preventDefault(); focusCell(r + 1, 0); }
    }
    return;
  }

  if (e.key.startsWith("Arrow")) {
    if (e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) return;
    const info = caretInfo(cell);
    if (!info) return;
    if (e.key === "ArrowUp" && info.onFirstLine && r > 0) {
      e.preventDefault();
      focusCell(r - 1, c);
    } else if (e.key === "ArrowDown" && info.onLastLine && r < data.length - 1) {
      e.preventDefault();
      focusCell(r + 1, c);
    } else if (e.key === "ArrowLeft" && info.atStart && c > 0) {
      e.preventDefault();
      focusCell(r, c - 1);
    } else if (e.key === "ArrowRight" && info.atEnd && c < colCount() - 1) {
      e.preventDefault();
      focusCell(r, c + 1);
    }
  }
});

// Excel / Google スプレッドシートは改行を含むセルを二重引用符で囲んでコピーする
// （"" は " に復元）ため、引用符付きフィールドを解釈して分割する
function parseTsv(text) {
  text = text.replace(/\r\n?/g, "\n");
  const rows = [];
  let row = [];
  let field = "";
  let started = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (!started && ch === '"') {
      started = true;
      i++;
      while (i < text.length) {
        if (text[i] === '"') {
          if (text[i + 1] === '"') {
            field += '"';
            i += 2;
          } else {
            i++;
            break;
          }
        } else {
          field += text[i++];
        }
      }
      continue;
    }
    if (ch === "\t") {
      row.push(field);
      field = "";
      started = false;
      i++;
    } else if (ch === "\n") {
      row.push(field);
      rows.push(row);
      row = [];
      field = "";
      started = false;
      i++;
    } else {
      field += ch;
      started = true;
      i++;
    }
  }
  row.push(field);
  rows.push(row);
  if (rows.length > 1 && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === "") {
    rows.pop();
  }
  return rows;
}

table.addEventListener("paste", e => {
  const cell = e.target.closest(".cell");
  if (!cell || !e.clipboardData) return;
  const text = e.clipboardData.getData("text/plain");
  if (!/[\t\r\n]/.test(text)) return;
  e.preventDefault();
  pushUndo();
  const grid = parseTsv(text);
  const r0 = Number(cell.dataset.r);
  const c0 = Number(cell.dataset.c);
  const needCols = Math.max(colCount(), c0 + Math.max(...grid.map(g => g.length)));
  while (data.length < r0 + grid.length) data.push(Array(colCount()).fill(""));
  data.forEach(row => {
    while (row.length < needCols) row.push("");
  });
  grid.forEach((g, i) => g.forEach((v, j) => {
    data[r0 + i][c0 + j] = v;
  }));
  markDirty();
  render();
  focusCell(r0, c0, "end");
});

tabsEl.addEventListener("click", e => {
  if (e.target.closest(".add-sheet")) {
    addSheet();
    return;
  }
  const tab = e.target.closest(".tab");
  if (tab) switchSheet(Number(tab.dataset.i));
});

tabsEl.addEventListener("dblclick", e => {
  const tab = e.target.closest(".tab");
  if (tab && !tab.hasAttribute("contenteditable")) startRenameSheet(Number(tab.dataset.i));
});

tabsEl.addEventListener("contextmenu", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  e.preventDefault();
  e.stopPropagation();
  const i = Number(tab.dataset.i);
  showMenu(e.clientX, e.clientY, [
    [t("sheetRename"), () => startRenameSheet(i)],
    [t("sheetLeft"), () => moveSheet(i, -1)],
    [t("sheetRight"), () => moveSheet(i, 1)],
    [t("sheetDelete"), () => deleteSheet(i)],
  ]);
});

let titlePending = null;
let titleEdited = false;

titleEl.setAttribute("contenteditable", editMode);

titleEl.addEventListener("focusin", () => {
  titlePending = JSON.stringify(doc);
  titleEdited = false;
});

titleEl.addEventListener("input", () => {
  if (!titleEdited && titlePending !== null) {
    undoStack.push(titlePending);
    if (undoStack.length > 100) undoStack.shift();
    redoStack.length = 0;
    titleEdited = true;
  }
  doc.title = titleEl.textContent.replace(/\n/g, " ").trim() || "One File Sheet";
  markDirty();
});

titleEl.addEventListener("keydown", e => {
  if (e.isComposing) return;
  if (e.key === "Enter") {
    e.preventDefault();
    titleEl.blur();
  }
});

titleEl.addEventListener("focusout", () => {
  renderTitle();
});

function hideHelp() {
  helpEl.hidden = true;
}

function hideThemePop() {
  themePop.hidden = true;
}

helpBtn.addEventListener("click", e => {
  e.stopPropagation();
  if (!helpEl.hidden) {
    hideHelp();
    return;
  }
  hideMenu();
  hideThemePop();
  helpEl.innerHTML = "";
  const heading = document.createElement("b");
  heading.textContent = t("helpTitle");
  helpEl.appendChild(heading);
  const list = document.createElement("ul");
  for (let i = 1; i <= 12; i++) {
    const li = document.createElement("li");
    li.textContent = t("help" + i);
    list.appendChild(li);
  }
  helpEl.appendChild(list);
  helpEl.hidden = false;
  const btnRect = helpBtn.getBoundingClientRect();
  const popRect = helpEl.getBoundingClientRect();
  helpEl.style.left = Math.max(8, Math.min(btnRect.left, window.innerWidth - popRect.width - 8)) + "px";
  helpEl.style.top = (btnRect.bottom + 6) + "px";
});

function renderThemePicker() {
  themePop.innerHTML = "";
  const makeItem = (id, name, theme) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "theme-item" + (doc.theme === id ? " active" : "");
    const dot = document.createElement("span");
    dot.className = "swatch";
    if (theme) {
      dot.style.background = theme.bg;
      dot.style.borderColor = theme.accent;
    } else {
      dot.style.background = "linear-gradient(135deg, #ffffff 50%, #1e1e1e 50%)";
      dot.style.borderColor = "#888";
    }
    b.appendChild(dot);
    b.appendChild(document.createTextNode(name));
    b.onclick = e => {
      e.stopPropagation();
      if (doc.theme !== id) {
        doc.theme = id;
        applyTheme();
        markDirty();
        renderThemePicker();
      }
    };
    themePop.appendChild(b);
  };
  makeItem("auto", "Auto", null);
  THEME_LIST.forEach(t => makeItem(t.id, t.name, t));
}

themeBtn.addEventListener("click", e => {
  e.stopPropagation();
  if (!themePop.hidden) {
    hideThemePop();
    return;
  }
  hideMenu();
  hideHelp();
  renderThemePicker();
  themePop.hidden = false;
  const btnRect = themeBtn.getBoundingClientRect();
  const popRect = themePop.getBoundingClientRect();
  themePop.style.left = Math.max(8, Math.min(btnRect.right - popRect.width, window.innerWidth - popRect.width - 8)) + "px";
  themePop.style.top = (btnRect.bottom + 6) + "px";
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (!themePop.hidden) {
      hideThemePop();
    } else if (!helpEl.hidden) {
      hideHelp();
    } else if (!menuEl.hidden) {
      hideMenu();
    } else if (table.contains(document.activeElement)) {
      document.activeElement.blur();
    }
    return;
  }
  if (!(e.ctrlKey || e.metaKey)) return;
  const key = e.key.toLowerCase();
  if (key === "s") {
    e.preventDefault();
    saveToSameFile();
  } else if (key === "z" && e.shiftKey) {
    e.preventDefault();
    redo();
  } else if (key === "z") {
    e.preventDefault();
    undo();
  } else if (key === "y") {
    e.preventDefault();
    redo();
  }
});

document.addEventListener("click", e => {
  if (!menuEl.hidden && !menuEl.contains(e.target)) hideMenu();
  if (!helpEl.hidden && !helpEl.contains(e.target)) hideHelp();
  if (!themePop.hidden && !themePop.contains(e.target)) hideThemePop();
});

document.addEventListener("contextmenu", e => {
  if (!menuEl.hidden && !menuEl.contains(e.target)) hideMenu();
  if (!helpEl.hidden && !helpEl.contains(e.target)) hideHelp();
  if (!themePop.hidden && !themePop.contains(e.target)) hideThemePop();
});

window.addEventListener("beforeunload", e => {
  if (dirty) {
    e.preventDefault();
    e.returnValue = "";
  }
});

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = () => {
      request.result.createObjectStore(DB_STORE);
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveStoredHandle(handle) {
  const db = await openHandleDB();

  await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(handle, HANDLE_KEY);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });

  db.close();
}

async function loadStoredHandle() {
  const db = await openHandleDB();

  const handle = await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const request = tx.objectStore(DB_STORE).get(HANDLE_KEY);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error);
  });

  db.close();
  return handle;
}

async function verifyWritePermission(handle) {
  if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") {
    return true;
  }

  return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
}

async function extractSheetJson(handle) {
  const file = await handle.getFile();
  const text = await file.text();
  const match = text.match(SHEET_DATA_RE);
  if (!match) {
    alert(t("noBlockInFile"));
    return null;
  }
  // ディスク側は CRLF の可能性があるため LF に正規化して比較の土台を揃える
  return match[1].replace(/\r\n?/g, "\n").trim();
}

async function adoptHandle(handle, loadData) {
  const rawJson = await extractSheetJson(handle);
  if (rawJson === null) return false;

  if (loadData) {
    try {
      doc = normalizeDoc(JSON.parse(rawJson));
      dirty = false;
      undoStack.length = 0;
      redoStack.length = 0;
      activePos = null;
      syncDocUI();
    } catch (error) {
      if (!confirm(t("brokenJsonAdopt1") + error.message + t("brokenJsonAdopt2"))) {
        return false;
      }
    }
  }

  fileHandle = handle;
  lastLoadedJson = rawJson;
  refreshStatus();
  return true;
}

async function pickFile() {
  if (!window.showOpenFilePicker) {
    alert(t("noFsApi"));
    return null;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{
        description: "HTML File",
        accept: { "text/html": [".html"] }
      }]
    });
    return handle;
  } catch (error) {
    if (error && error.name === "AbortError") return null;
    alert(t("pickFail") + error.message);
    return null;
  }
}

// 初回保存時に呼ばれる: 現在の編集内容を保持したまま保存先だけを設定する
async function pickSaveTarget() {
  const handle = await pickFile();
  if (!handle) return false;

  try {
    if (!(await adoptHandle(handle, false))) return false;
  } catch (error) {
    alert(t("loadFail") + error.message);
    return false;
  }

  try {
    await saveStoredHandle(handle);
  } catch (error) {
    console.warn("failed to persist save target handle", error);
  }
  return true;
}

async function reloadFromFile() {
  if (!fileHandle) {
    alert(t("reloadNoTarget"));
    return;
  }
  if (dirty && !confirm(t("confirmDiscardReload"))) {
    return;
  }
  try {
    if ((await fileHandle.queryPermission({ mode: "read" })) !== "granted" &&
        (await fileHandle.requestPermission({ mode: "read" })) !== "granted") {
      alert(t("noReadPerm"));
      return;
    }
    if (await adoptHandle(fileHandle, true)) {
      showToast(t("toastReloaded") + fileHandle.name);
    }
  } catch (error) {
    alert(t("reloadFail") + error.message + t("checkFileMoved"));
  }
}

async function saveToSameFile() {
  if (saving) return;
  if (!fileHandle) {
    // 保存先が未設定なら、その場でファイルを選んでそのまま保存まで進む
    if (!(await pickSaveTarget())) return;
  }

  saving = true;
  try {
    if (!(await verifyWritePermission(fileHandle))) {
      alert(t("noWritePerm"));
      return;
    }

    const file = await fileHandle.getFile();
    const html = await file.text();

    const match = html.match(SHEET_DATA_RE);
    if (!match) {
      alert(t("saveNoBlock"));
      return;
    }

    const diskJson = match[1].replace(/\r\n?/g, "\n").trim();
    if (lastLoadedJson === null) {
      if (!confirm(t("confirmNullBaseline"))) {
        return;
      }
    } else if (diskJson !== lastLoadedJson) {
      if (!confirm(t("confirmConflict"))) {
        return;
      }
    }

    // "<" を \u003c にエスケープし、セル内に閉じタグ相当の文字列があってもブロックが壊れないようにする
    const json = JSON.stringify(doc, null, 2).replace(/</g, "\\u003c");
    const newBlock = OPEN_TAG + "\n" + json + "\n" + CLOSE_TAG;
    // 置換文字列中の $ が特殊解釈されないよう、関数で渡す
    const updated = html.replace(SHEET_DATA_RE, () => newBlock);

    const writable = await fileHandle.createWritable();
    await writable.write(updated);
    await writable.close();

    lastLoadedJson = json;
    dirty = false;
    refreshStatus();
    showToast(t("toastSaved") + fileHandle.name);
  } catch (error) {
    alert(t("saveFail1") + error.message + t("saveFail2"));
  } finally {
    saving = false;
  }
}

function sanitizeName(name) {
  return name.replace(/[\\/:*?"<>|]/g, "_");
}

function downloadBlob(blob, filename) {
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function exportCsv() {
  const escapeCsv = value => (/[",\r\n]/.test(value) ? '"' + value.replace(/"/g, '""') + '"' : value);
  const csv = "\uFEFF" + data.map(row => row.map(escapeCsv).join(",")).join("\r\n") + "\r\n";
  const base = fileHandle ? fileHandle.name.replace(/\.html?$/i, "") : doc.title;
  const sheet = doc.sheets[doc.activeSheet].name;
  downloadBlob(new Blob([csv], { type: "text/csv" }), sanitizeName(base + "_" + sheet) + ".csv");
  showToast(t("toastCsv") + sheet);
}

// \u8D77\u52D5\u6642\u306E\u7D20\u306EHTML\u306B\u73FE\u5728\u306E\u30C9\u30AD\u30E5\u30E1\u30F3\u30C8\u3092\u5DEE\u3057\u8FBC\u3093\u3060\u300C\u81EA\u5206\u81EA\u8EAB\u306E\u8907\u88FD\u300D\u3092\u4F5C\u308B\u3002
// File System Access API \u306B\u975E\u5BFE\u5FDC\u306E\u30D6\u30E9\u30A6\u30B6\u3084\u30C7\u30E2\u30DA\u30FC\u30B8\u3067\u3082\u4FDD\u5B58\u624B\u6BB5\u306B\u306A\u308B
function buildExportHtml() {
  const json = JSON.stringify(doc, null, 2).replace(/</g, "\\u003c");
  const newBlock = OPEN_TAG + "\n" + json + "\n" + CLOSE_TAG;
  return BOOT_HTML.replace(SHEET_DATA_RE, () => newBlock);
}

function exportHtml() {
  downloadBlob(new Blob([buildExportHtml()], { type: "text/html" }), sanitizeName(doc.title || "OneFileSheet") + ".html");
  showToast(t("toastHtml"));
}

document.getElementById("export-btn").addEventListener("click", e => {
  e.stopPropagation();
  hideHelp();
  hideThemePop();
  const rect = e.currentTarget.getBoundingClientRect();
  showMenu(rect.left, rect.bottom + 6, [
    [t("exportHtmlItem"), exportHtml],
    [t("exportCsvItem"), exportCsv],
  ]);
});

statusEl.addEventListener("click", async () => {
  if (!(await pickSaveTarget())) return;
  showToast(t("toastTargetSet") + fileHandle.name);
});

langBtn.addEventListener("click", e => {
  e.stopPropagation();
  hideHelp();
  hideThemePop();
  const rect = e.currentTarget.getBoundingClientRect();
  showMenu(rect.left, rect.bottom + 6, [
    [t("langAuto"), () => setLang("auto")],
    ["English", () => setLang("en")],
    ["\u65E5\u672C\u8A9E", () => setLang("ja")],
  ]);
});

async function initialize() {
  renderPath();
  syncDocUI();
  refreshStatus();

  if (!window.showOpenFilePicker || !window.indexedDB) {
    return;
  }

  try {
    fileHandle = await loadStoredHandle();
    refreshStatus();
  } catch (error) {
    console.warn("failed to restore save target handle", error);
  }
}

initialize();
</script>
