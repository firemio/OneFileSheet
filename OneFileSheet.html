<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>One File Sheet</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  button { margin: 4px; padding: 8px 12px; }
  #save-status { margin-left: 8px; color: #555; font-size: 14px; }
  table { border-collapse: collapse; margin-top: 12px; }
  td, th {
    border: 1px solid #ccc;
    width: 120px;
    height: 28px;
    padding: 4px;
  }
  td { cursor: text; }
</style>
</head>
<body>

<h2>One File Sheet</h2>

<button onclick="openSelfFile()">保存先を設定</button>
<button onclick="addRow()">行追加</button>
<button onclick="addCol()">列追加</button>
<button onclick="saveToSameFile()">上書き保存</button>
<span id="save-status">保存先未設定</span>

<table id="sheet"></table>

<script id="sheet-data" type="application/json">
[
  [
    "Name",
    "Amount",
    "Memo"
  ],
  [
    "Alice",
    "34",
    "test"
  ],
  [
    "Bob",
    "200",
    ""
  ]
]
</script>

<script>
let fileHandle = null;
const DB_NAME = "one-file-sheet";
const DB_STORE = "handles";
const HANDLE_KEY = "self-file";

let data = JSON.parse(
  document.getElementById("sheet-data").textContent.trim()
);

function render() {
  const table = document.getElementById("sheet");
  table.innerHTML = "";

  data.forEach((row, r) => {
    const tr = document.createElement("tr");

    row.forEach((cell, c) => {
      const el = document.createElement(r === 0 ? "th" : "td");
      el.contentEditable = true;
      el.textContent = cell;

      el.oninput = () => {
        data[r][c] = el.textContent;
      };

      tr.appendChild(el);
    });

    table.appendChild(tr);
  });
}

function setSaveStatus(message) {
  document.getElementById("save-status").textContent = message;
}

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = () => {
      request.result.createObjectStore(DB_STORE);
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveStoredHandle(handle) {
  const db = await openHandleDB();

  await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(handle, HANDLE_KEY);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });

  db.close();
}

async function loadStoredHandle() {
  const db = await openHandleDB();

  const handle = await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const request = tx.objectStore(DB_STORE).get(HANDLE_KEY);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error);
  });

  db.close();
  return handle;
}

async function verifyWritePermission(handle) {
  if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") {
    return true;
  }

  return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
}

async function openSelfFile() {
  if (!window.showOpenFilePicker) {
    alert("このブラウザはFile System Access APIに対応していません。ChromeかEdgeで開いてください。");
    return;
  }

  const [handle] = await window.showOpenFilePicker({
    types: [{
      description: "HTML File",
      accept: { "text/html": [".html"] }
    }]
  });

  fileHandle = handle;

  try {
    await saveStoredHandle(handle);
  } catch (error) {
    console.warn("保存先の記録に失敗しました。", error);
  }

  const file = await handle.getFile();
  const text = await file.text();

  const match = text.match(
    /<script id="sheet-data" type="application\/json">([\s\S]*?)<\/script>/
  );

  if (!match) {
    alert("sheet-data が見つかりません。");
    return;
  }

  data = JSON.parse(match[1].trim());
  render();

  alert("HTMLファイルを読み込みました。");
  setSaveStatus(`保存先: ${handle.name}`);
}

function addRow() {
  data.push(Array(data[0].length).fill(""));
  render();
}

function addCol() {
  data.forEach(row => row.push(""));
  render();
}

async function saveToSameFile() {
  if (!fileHandle) {
    alert("先に「保存先を設定」で保存対象のHTMLファイルを選んでください。");
    return;
  }

  if (!(await verifyWritePermission(fileHandle))) {
    alert("保存する権限がありません。もう一度「保存先を設定」からHTMLファイルを選んでください。");
    return;
  }

  const file = await fileHandle.getFile();
  let html = await file.text();

  const newDataBlock =
`<script id="sheet-data" type="application/json">
${JSON.stringify(data, null, 2)}
<\/script>`;

  html = html.replace(
    /<script id="sheet-data" type="application\/json">[\s\S]*?<\/script>/,
    newDataBlock
  );

  const writable = await fileHandle.createWritable();
  await writable.write(html);
  await writable.close();

  alert("同じHTMLファイルに上書き保存しました。");
  setSaveStatus(`保存済み: ${fileHandle.name}`);
}

async function initialize() {
  render();

  if (!window.showOpenFilePicker || !window.indexedDB) {
    return;
  }

  try {
    fileHandle = await loadStoredHandle();

    if (fileHandle) {
      setSaveStatus(`保存先: ${fileHandle.name}`);
    }
  } catch (error) {
    console.warn("保存先の復元に失敗しました。", error);
  }
}

initialize();
</script>

</body>
</html>
