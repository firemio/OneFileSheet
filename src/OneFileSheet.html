<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>OneFileSheet</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --border: #d9d9de;
    --accent: #2563eb;
    --head-bg: #f4f4f5;
    --coord-bg: #ececef;
    --coord-fg: #6b6b74;
    --hover: rgba(37, 99, 235, 0.06);
    --status: #555;
    --ok: #15803d;
    --warn: #b45309;
    --btn-bg: #ffffff;
    --btn-border: #c8c8cd;
    --menu-shadow: rgba(0, 0, 0, 0.15);
    /* スクロールバーもテーマ色に追従させる（CSS変数経由なのでJS側の
       テーマ切替でそのまま更新される） */
    scrollbar-color: color-mix(in srgb, var(--accent) 45%, var(--coord-bg)) var(--coord-bg);
  }
  /* テーマの実体は app-code の THEME_LIST から JS がCSS変数を導出して適用する。
     以下はJS実行前の初期描画用フォールバック */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --fg: #e6e6e6;
      --border: #3a3a3a;
      --accent: #60a5fa;
      --head-bg: #2a2a2a;
      --coord-bg: #262626;
      --coord-fg: #9a9aa2;
      --hover: rgba(96, 165, 250, 0.08);
      --status: #aaa;
      --ok: #4ade80;
      --warn: #fbbf24;
      --btn-bg: #2a2a2a;
      --btn-border: #454545;
      --menu-shadow: rgba(0, 0, 0, 0.5);
    }
  }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    margin: 0;
    padding: 10px 14px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--fg);
  }
  .topbar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .topbar .sep { width: 6px; }
  #doc-title {
    margin: 0 8px 0 0;
    font-size: 17px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: text;
    white-space: pre;
  }
  #doc-title:hover { background: var(--hover); }
  #doc-title:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  #file-path {
    margin-left: auto;
    color: var(--status);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 38%;
  }
  #help-pop {
    position: fixed;
    z-index: 10;
    max-width: 440px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
    font-size: 13px;
  }
  #help-pop[hidden] { display: none; }
  #help-pop ul { margin: 6px 0 0; padding-left: 18px; }
  #help-pop li { margin: 4px 0; }
  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 12px;
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--fg);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button svg { display: block; }
  button svg[hidden] { display: none; }
  .topbar button { padding: 7px 9px; }
  #theme-pop {
    position: fixed;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    width: 420px;
    max-width: calc(100vw - 24px);
    max-height: 70vh;
    overflow: auto;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
  }
  #theme-pop[hidden] { display: none; }
  #theme-pop .theme-item {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    padding: 5px 8px;
    border: 1px solid transparent;
    background: none;
    border-radius: 6px;
    font-size: 12px;
    color: var(--fg);
  }
  #theme-pop .theme-item:hover { background: var(--hover); }
  #theme-pop .theme-item.active { border-color: var(--accent); }
  #theme-pop .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    flex: none;
  }
  #save-status { margin-left: 6px; color: var(--status); font-size: 13px; }
  #save-status.hint {
    cursor: pointer;
    text-decoration: underline dotted;
    text-underline-offset: 3px;
  }
  #lang-btn { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; min-width: 34px; }
  #sheet-tabs .tab[contenteditable] { cursor: text; outline: 2px solid var(--accent); outline-offset: -2px; }
  #save-status.ok { color: var(--ok); }
  #save-status.warn { color: var(--warn); }
  .sheet-wrap {
    overflow: auto;
    /* 仮想スクロールがスペーサー高さを調整するため、ブラウザの
       スクロールアンカリングと干渉しないよう無効化する */
    overflow-anchor: none;
    flex: 1 1 auto;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  /* 列幅は JS が colgroup で与える。fixed にしないと1セルの編集で
     表全体の再レイアウトが走り、大きなシートで固まる */
  table { border-collapse: separate; border-spacing: 0; table-layout: fixed; }
  .v-pad td { padding: 0; border: none; height: 0; }
  td, th {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px 6px;
    font-size: 14px;
    text-align: left;
  }
  tr:last-child td, tr:last-child th { border-bottom: none; }
  td:last-child, th:last-child { border-right: none; }
  .cell {
    min-width: 120px;
    max-width: 360px;
    height: 28px;
    cursor: text;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  th.cell { background: var(--head-bg); font-weight: 600; }
  .cell:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  tr:hover td.cell { background: var(--hover); }
  th.coord {
    background: var(--coord-bg);
    color: var(--coord-fg);
    font-weight: 500;
    font-size: 12px;
    text-align: center;
    padding: 2px 8px;
    cursor: pointer;
    user-select: none;
    min-width: 28px;
  }
  th.coord:hover { color: var(--accent); }
  th.col-head, th.corner { position: sticky; top: 0; z-index: 2; }
  th.row-head, th.corner { position: sticky; left: 0; }
  th.corner { z-index: 3; cursor: default; }
  th.row-head { z-index: 1; }
  .stat-btn { cursor: pointer; }
  .stat-btn:hover { color: var(--accent); }
  .stat-btn.active { color: var(--accent); }
  .stat-btn svg { display: inline-block; vertical-align: middle; }
  th.stat-row-btn { min-width: 24px; padding: 2px 6px; text-align: center; position: sticky; right: 0; z-index: 1; }
  /* position は上の sticky 指定を上書きしない（sticky でも .head-stat の
     絶対配置の基準になるため relative は不要） */
  th.col-head, th.row-head { padding-right: 18px; }
  .head-stat {
    position: absolute;
    right: 3px;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    color: var(--coord-fg);
  }
  th.corner-tr { position: sticky; top: 0; right: 0; z-index: 3; cursor: default; }
  #sheet-tabs {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 2px;
    margin-top: 12px;
    margin-bottom: -1px;
    padding: 0 6px;
    position: relative;
    z-index: 1;
  }
  #sheet-tabs .tab {
    padding: 5px 16px;
    background: var(--coord-bg);
    color: var(--status);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  #sheet-tabs .tab.active {
    background: var(--bg);
    color: var(--fg);
    font-weight: 600;
    box-shadow: 0 1px 0 var(--bg);
  }
  #sheet-tabs .add-sheet {
    padding: 4px 10px;
    margin-left: 4px;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  #ctx-menu {
    position: fixed;
    z-index: 10;
    display: flex;
    flex-direction: column;
    min-width: 150px;
    padding: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
  }
  #ctx-menu[hidden] { display: none; }
  #ctx-menu button {
    border: none;
    background: none;
    border-radius: 5px;
    padding: 6px 10px;
    justify-content: flex-start;
    text-align: left;
    font-size: 13px;
    color: var(--fg);
  }
  #ctx-menu button:hover { background: var(--hover); color: var(--accent); }
  /* 発光系テーマ（THEME_LIST の glow: true）でのみ有効になるグロー */
  :root[data-glow] body { text-shadow: 0 0 8px currentColor; }
  :root[data-glow] button svg { filter: drop-shadow(0 0 4px currentColor); }
  :root[data-glow] #doc-title { text-shadow: 0 0 8px currentColor, 0 0 22px var(--glow-soft); }
  :root[data-glow] .sheet-wrap {
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--glow-soft), 0 0 26px var(--glow-soft), inset 0 0 14px var(--glow-faint);
  }
  :root[data-glow] td, :root[data-glow] th { border-color: color-mix(in srgb, var(--accent) 35%, var(--bg)); }
  :root[data-glow] .cell:focus { box-shadow: 0 0 8px var(--glow-soft), 0 0 22px var(--glow-soft); }
  :root[data-glow] button { border-color: color-mix(in srgb, var(--accent) 45%, var(--btn-bg)); }
  :root[data-glow] button:hover { box-shadow: 0 0 14px var(--glow-soft); }
  :root[data-glow] #sheet-tabs .tab { border-color: color-mix(in srgb, var(--accent) 35%, var(--bg)); }
  :root[data-glow] #sheet-tabs .tab.active {
    border-color: var(--accent);
    box-shadow: 0 1px 0 var(--bg), 0 0 16px var(--glow-soft);
  }
  :root[data-glow] #ctx-menu,
  :root[data-glow] #help-pop,
  :root[data-glow] #theme-pop,
  :root[data-glow] #stats-pop {
    border-color: var(--accent);
    box-shadow: 0 4px 16px var(--menu-shadow), 0 0 20px var(--glow-soft);
  }
  #stats-pop {
    position: fixed;
    z-index: 10;
    min-width: 190px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--menu-shadow);
    font-size: 13px;
  }
  #stats-pop[hidden] { display: none; }
  #stats-pop b { display: block; margin-bottom: 6px; }
  #stats-pop .stat-row { display: flex; justify-content: space-between; gap: 16px; margin: 3px 0; }
  #stats-pop .stat-row span:first-child { color: var(--status); }
  #drop-overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.35);
    pointer-events: none;
  }
  #drop-overlay[hidden] { display: none; }
  #drop-overlay .drop-box {
    padding: 24px 48px;
    border: 2px dashed var(--accent);
    border-radius: 12px;
    background: var(--bg);
    color: var(--fg);
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="topbar">
  <h2 id="doc-title" title="クリックでタイトルを編集">OneFileSheet</h2>
  <button id="save-btn" onclick="saveToSameFile()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>

  </button>
  <span class="sep"></span>
  <span id="save-status">保存先未設定</span>
  <span id="file-path"></span>
  <button id="export-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button id="help-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </button>
  <button id="lang-btn"></button>
  <button id="theme-btn">
    <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    <svg id="theme-icon-moon" hidden width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
  </button>
</div>

<div id="help-pop" hidden></div>

<div id="theme-pop" hidden></div>

<div id="stats-pop" hidden></div>

<div id="drop-overlay" hidden><div class="drop-box"></div></div>

<div id="sheet-tabs"></div>

<div class="sheet-wrap">
  <table id="sheet"></table>
</div>

<div id="ctx-menu" hidden></div>

<!--
AGENT NOTES — contract for AI/coding agents editing this file:
- The spreadsheet document lives ONLY in the JSON block directly below this
  comment: the script element with id "sheet-data" (type application/json).
  Everything else in this file is application code/UI.
- Document format (v2):
  { "title": string, "theme": "auto" or a theme id from THEME_LIST in the
    app code (43 built-in themes),
    "lang": "auto"|"en"|"ja" (UI language; "auto" follows the browser),
    "activeSheet": number, "sheets": [ { "name": string, "data": [[...]] } ] }
  Each sheet's data is a JSON 2D array of strings; data[0] is that sheet's
  header row. All rows in a sheet have equal length (the app pads ragged rows
  on load). Cells are plain strings; numbers are coerced to strings.
  A legacy bare 2D array is still accepted on load and migrates to v2 on the
  next save.
- Keep the formatting produced by JSON.stringify(doc, null, 2): 2-space
  indent, LF line endings. This keeps saves diff-stable.
- Do NOT rename, duplicate, or reformat the opening tag of the sheet-data
  block. The app locates the block with a regex keyed on id="sheet-data";
  extra attributes are tolerated but the id must stay.
- If a cell value contains "<", write it as \u003c in the JSON so the block
  cannot terminate early. Cell newlines are stored as \n. The in-app save
  applies this escaping automatically.
- Co-editing semantics: the browser app keeps the document in memory. Saving
  from the browser re-reads this file from disk and rewrites ONLY the
  sheet-data block, so code edits elsewhere in the file survive a user save.
  If you change the JSON while the file is open in a browser, the user should
  press 再読み込み before saving; the app also warns when the on-disk block
  changed after load.
- App code lives in the script element with id "app-code" at the end of body.
  Entry points: render(), reloadFromFile(), saveToSameFile(), exportHtml(),
  exportCsv(), initialize(). UI strings live in the MESSAGES catalog (en/ja);
  keep identifiers English.
-->

<script id="app-code">
"use strict";

const table = document.getElementById("sheet");
const wrapEl = document.querySelector(".sheet-wrap");
const statusEl = document.getElementById("save-status");
const menuEl = document.getElementById("ctx-menu");
const titleEl = document.getElementById("doc-title");
const pathEl = document.getElementById("file-path");
const tabsEl = document.getElementById("sheet-tabs");
const helpBtn = document.getElementById("help-btn");
const helpEl = document.getElementById("help-pop");
const langBtn = document.getElementById("lang-btn");
const statsPop = document.getElementById("stats-pop");
const themeBtn = document.getElementById("theme-btn");
const themePop = document.getElementById("theme-pop");
const themeIconSun = document.getElementById("theme-icon-sun");
const themeIconMoon = document.getElementById("theme-icon-moon");

// HTMLエクスポート用に、JSがDOMへ手を入れる前の素のドキュメントを控えておく。
// 自己解凍版(build.js製)ではブートストラップが控えた圧縮シェルを使う
const BOOT_HTML = window.__PACKED_HTML__ || "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

const DB_NAME = "one-file-sheet";
const DB_STORE = "handles";
const HANDLE_KEY = "self-file:" + location.href;
const LAST_HANDLE_KEY = "last-picked";
// テーマは bg / fg / accent の3色だけ定義し、残りのCSS変数は themeVars() が導出する
const THEME_LIST = [
  { id: "light", name: "Light", bg: "#ffffff", fg: "#1a1a1a", accent: "#2563eb" },
  { id: "dark", name: "Dark", bg: "#1e1e1e", fg: "#e6e6e6", accent: "#60a5fa" },
  { id: "sepia", name: "Sepia", bg: "#f5ecd9", fg: "#4a3a26", accent: "#9a6b2f" },
  { id: "ocean", name: "Ocean", bg: "#0e1a2b", fg: "#d7e4f2", accent: "#4cc3ff" },
  { id: "forest", name: "Forest", bg: "#f1f7f0", fg: "#233a28", accent: "#2f855a" },
  { id: "paper", name: "Paper", bg: "#fafaf7", fg: "#33322e", accent: "#d97706" },
  { id: "snow", name: "Snow", bg: "#f7fafd", fg: "#26323f", accent: "#3b82f6" },
  { id: "mint", name: "Mint", bg: "#effaf5", fg: "#1f3d33", accent: "#0d9488" },
  { id: "sky", name: "Sky", bg: "#eef6ff", fg: "#1e3a5f", accent: "#0284c7" },
  { id: "sand", name: "Sand", bg: "#f6f1e7", fg: "#43382a", accent: "#b45309" },
  { id: "rose", name: "Rose", bg: "#fdf2f6", fg: "#4a2333", accent: "#db2777" },
  { id: "lavender", name: "Lavender", bg: "#f5f2fc", fg: "#372f4d", accent: "#7c3aed" },
  { id: "sakura", name: "Sakura", bg: "#fdf3f4", fg: "#502b33", accent: "#e11d48" },
  { id: "lemon", name: "Lemon", bg: "#fdfbe8", fg: "#3f3a1a", accent: "#ca8a04" },

function normalizeData(value) {
  if (!Array.isArray(value) || value.length === 0) return [[""]];
  const rows = value.map(row => (Array.isArray(row) ? row : [row]));
  const width = Math.max(1, ...rows.map(row => row.length));
  return rows.map(row =>
    Array.from({ length: width }, (_, i) => (row[i] == null ? "" : String(row[i])))
  );
}

function normalizeDoc(parsed) {
  let title = "OneFileSheet";
  let theme = "auto";
  let lang = "auto";
  let activeSheet = 0;
  let sheets;

  if (Array.isArray(parsed)) {
    sheets = [{ name: "Sheet1", data: parsed }];
  } else if (parsed && typeof parsed === "object" && Array.isArray(parsed.sheets)) {
    if (typeof parsed.title === "string" && parsed.title.trim()) title = parsed.title.trim();
    if (parsed.theme === "auto" || THEME_MAP[parsed.theme]) theme = parsed.theme;
    if (parsed.lang === "en" || parsed.lang === "ja") lang = parsed.lang;
    sheets = parsed.sheets;
    activeSheet = parsed.activeSheet;
  } else {
    throw new Error("not a sheet document");
  }

  if (sheets.length === 0) sheets = [{ name: "Sheet1", data: [[""]] }];
  const normSheets = sheets.map((s, i) => ({
    name: s && typeof s.name === "string" && s.name.trim() ? s.name.trim() : "Sheet" + (i + 1),
    data: normalizeData(s ? s.data : null),
  }));
  if (!Number.isInteger(activeSheet) || activeSheet < 0 || activeSheet >= normSheets.length) {
    activeSheet = 0;
  }
  return { title: title, theme: theme, lang: lang, activeSheet: activeSheet, sheets: normSheets };
}

// ---- 仮想スクロール ----
// 大きなシートでも固まらないよう、DOMには可視範囲±OVERSCAN行だけを置く。
// 行の実高さは描画時に計測して控え、スペーサー行で全体の高さを再現する
const ROW_H = 29;
const OVERSCAN = 12;
const COL_MIN = 120;
const COL_MAX = 360;
let rowHeights = [];
let rowEls = new Map();
let vStart = 0;
let vEnd = 0;
let topSpacer = null;
let botSpacer = null;
let dataCols = [];
let colWidths = [];

const measureCtx = document.createElement("canvas").getContext("2d");

function cellFont() {
  return "14px " + getComputedStyle(document.body).fontFamily;
}

function textWidth(value) {
  let w = 0;
  const lines = value.includes("\n") ? value.split("\n") : [value];
  for (const line of lines) {
    const m = measureCtx.measureText(line).width;
    if (m > w) w = m;
  }
  return w;
}

// 1行の実高と1行あたりの増分を、不可視のプローブ行を実レンダリングして測る。
// CSSからの机上計算はフォント・ズーム・OSごとにズレるため、実測が唯一正確
let probeRowH = ROW_H;
let probeLineH = 19;

function measureProbe() {
  const probe = document.createElement("table");
  probe.style.cssText = "position:absolute;left:-9999px;top:0;visibility:hidden;border-collapse:separate;border-spacing:0;table-layout:fixed;width:260px";
  const makeRow = text => {
    const tr = document.createElement("tr");
    const head = document.createElement("th");
    head.className = "coord row-head";
    head.textContent = "888";
    tr.appendChild(head);
    const td = document.createElement("td");
    td.className = "cell";
    td.textContent = text;
    tr.appendChild(td);
    const stat = document.createElement("th");
    stat.className = "coord stat-btn stat-row-btn";
    stat.innerHTML = STAT_ICON;
    tr.appendChild(stat);
    return tr;
  };
  const one = makeRow("x");
  const three = makeRow("x\nx\nx");
  probe.appendChild(one);
  probe.appendChild(three);
  probe.appendChild(makeRow("x")); // 最終行は border-bottom が消えるルールの受け皿
  document.body.appendChild(probe);
  const h1 = one.getBoundingClientRect().height;
  const h3 = three.getBoundingClientRect().height;
  probe.remove();
  if (h1 > 0) probeRowH = h1;
  if (h3 > h1) probeLineH = (h3 - h1) / 2;
}

// 列幅と行高の見積もりを全データから一度に算出する（canvas計測なので
// DOMより桁違いに速い）。列幅はスクロールで揺れないようデータ全体を測る。
// 行高は「スクロールバーの長さ・位置」を全行描画なしで実際と一致させる
// ための見積もりで、改行や折り返しを含む行だけ2パス目で行数を数える
function computeLayout() {
  measureProbe();
  const family = getComputedStyle(document.body).fontFamily;
  const widths = new Array(colCount()).fill(0);
  const complexRows = [];
  const scanRow = r => {
    const row = data[r];
    let complex = false;
    for (let c = 0; c < row.length; c++) {
      const v = row[c];
      if (!v) continue;
      const w = textWidth(v);
      if (w > widths[c]) widths[c] = w;
      if (w > COL_MAX - 20 || v.includes("\n")) complex = true;
    }
    if (complex) complexRows.push(r);
  };
  measureCtx.font = "600 14px " + family;
  scanRow(0);
  measureCtx.font = "14px " + family;
  for (let r = 1; r < data.length; r++) scanRow(r);
  const colW = widths.map(w => Math.min(COL_MAX, Math.max(COL_MIN, Math.ceil(w) + 20)));

  const heights = new Array(data.length).fill(probeRowH);
  for (const r of complexRows) {
    measureCtx.font = (r === 0 ? "600 14px " : "14px ") + family;
    const row = data[r];
    let lines = 1;
    for (let c = 0; c < row.length; c++) {
      const v = row[c];
      if (!v) continue;
      const avail = Math.max(24, colW[c] - 14);
      let n = 0;
      for (const line of v.split("\n")) {
        n += Math.max(1, Math.ceil(measureCtx.measureText(line).width / avail));
      }
      if (n > lines) lines = n;
    }
    heights[r] = probeRowH + (lines - 1) * probeLineH;
  }
  return { colW: colW, heights: heights };
}

function rowHeadWidth() {
  return String(data.length).length * 8 + 30;
}

function rowTop(r) {
  let y = 0;
  for (let i = 0; i < r; i++) y += rowHeights[i];
  return y;
}

function spacerRow() {
  const tr = document.createElement("tr");
  tr.className = "v-pad";
  const td = document.createElement("td");
  td.colSpan = colCount() + 2;
  tr.appendChild(td);
  return tr;
}

function buildRow(r) {
  const row = data[r];
  const tr = document.createElement("tr");

  const rowHead = document.createElement("th");
  rowHead.className = "coord row-head";
  rowHead.dataset.r = r;
  rowHead.textContent = r + 1;
  rowHead.title = t("rowMenuTitle");
  rowHead.appendChild(makeHeadStatIcon("row", r));
  tr.appendChild(rowHead);

  row.forEach((cell, c) => {
    const el = document.createElement(r === 0 ? "th" : "td");
    el.className = "cell";
    el.setAttribute("contenteditable", editMode);
    el.dataset.r = r;
    el.dataset.c = c;
    el.textContent = cell;
    tr.appendChild(el);
  });

  const rowStat = document.createElement("th");
  rowStat.className = "coord stat-btn stat-row-btn";
  rowStat.dataset.r = r;
  rowStat.innerHTML = STAT_ICON;
  tr.appendChild(rowStat);

  return tr;
}

// 可視範囲の行だけをDOMに反映する。既存の行要素は再利用するので、
// 編集中のセルは小さなスクロールではフォーカスを失わない
function updateWindow(force) {
  if (!topSpacer) return;
  const total = data.length;
  const viewTop = wrapEl.scrollTop;
  const viewBottom = viewTop + wrapEl.clientHeight;

  let y = 0;
  let start = total;
  for (let i = 0; i < total; i++) {
    y += rowHeights[i];
    if (y > viewTop) { start = i; break; }
  }
  let end = start;
  y = rowTop(start);
  for (let i = start; i < total; i++) {
    if (y > viewBottom) break;
    y += rowHeights[i];
    end = i + 1;
  }
  start = Math.max(0, start - OVERSCAN);
  end = Math.min(total, end + OVERSCAN);

  if (!force && start === vStart && end === vEnd) return;

  for (const [r, el] of [...rowEls]) {
    if (r < start || r >= end) {
      el.remove();
      rowEls.delete(r);
    }
  }
  let anchor = botSpacer;
  for (let r = end - 1; r >= start; r--) {
    let el = rowEls.get(r);
    if (!el) {
      el = buildRow(r);
      table.insertBefore(el, anchor);
      rowEls.set(r, el);
    }
    anchor = el;
  }
  vStart = start;
  vEnd = end;

  // 描画した行の実高さを控えて、スペーサーの精度を上げる。
  // offsetHeight は整数丸めで誤差が積もるため小数の rect を使う
  for (const [r, el] of rowEls) {
    const h = el.getBoundingClientRect().height;
    if (h) rowHeights[r] = h;
  }
  topSpacer.firstChild.style.height = rowTop(start) + "px";
  botSpacer.firstChild.style.height = Math.max(0, rowTop(total) - rowTop(end)) + "px";

  refreshStatIcons();
}

let windowScheduled = false;

function scheduleWindow() {
  if (windowScheduled) return;
  windowScheduled = true;
  requestAnimationFrame(() => {
    windowScheduled = false;
    updateWindow(false);
  });
}

wrapEl.addEventListener("scroll", scheduleWindow);
window.addEventListener("resize", scheduleWindow);

function colCount() {
  return data[0] ? data[0].length : 0;
}

const STAT_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="11"/></svg>';

function makeHeadStatIcon(kind, index) {
  const s = document.createElement("span");
  s.className = "stat-btn head-stat";
  if (kind === "col") s.dataset.c = index;
  else s.dataset.r = index;
  s.innerHTML = STAT_ICON;
  return s;
}

function colLetter(c) {
  let s = "";
  let n = c;
  do {
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return s;
}

const darkMq = window.matchMedia("(prefers-color-scheme: dark)");
darkMq.addEventListener("change", applyTheme);

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function mix(a, b, t) {
  const A = hexToRgb(a);
  const B = hexToRgb(b);
  return "rgb(" + A.map((v, i) => Math.round(v + (B[i] - v) * t)).join(",") + ")";
}

function rgba(hex, alpha) {
  const [r, g, b] = hexToRgb(hex);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function isDarkColor(hex) {
  const [r, g, b] = hexToRgb(hex);
  return 0.2126 * r + 0.7152 * g + 0.0722 * b < 128;
}

function themeVars(theme) {
  const dark = isDarkColor(theme.bg);
  return {
    "--bg": theme.bg,
    "--fg": theme.fg,
    "--accent": theme.accent,
    "--border": mix(theme.bg, theme.fg, 0.17),
    "--head-bg": mix(theme.bg, theme.fg, 0.05),
    "--coord-bg": mix(theme.bg, theme.fg, 0.08),
    "--coord-fg": mix(theme.fg, theme.bg, 0.45),
    "--hover": rgba(theme.accent, 0.08),
    "--status": mix(theme.fg, theme.bg, 0.35),
    "--ok": dark ? "#4ade80" : "#15803d",
    "--warn": dark ? "#fbbf24" : "#b45309",
    "--btn-bg": mix(theme.bg, theme.fg, 0.03),
    "--btn-border": mix(theme.bg, theme.fg, 0.25),
    "--menu-shadow": dark ? "rgba(0,0,0,0.55)" : "rgba(0,0,0,0.18)",
    "--glow-soft": rgba(theme.accent, 0.5),
    "--glow-faint": rgba(theme.accent, 0.22),
  };
}

function applyTheme() {
  const id = doc.theme === "auto" ? (darkMq.matches ? "dark" : "light") : doc.theme;
  const theme = THEME_MAP[id] || THEME_MAP.light;
  const vars = themeVars(theme);
  for (const key in vars) {
    document.documentElement.style.setProperty(key, vars[key]);
  }
  const dark = isDarkColor(theme.bg);
  // SVGElement に .hidden プロパティはないため属性で切り替える
  themeIconSun.toggleAttribute("hidden", dark);
  themeIconMoon.toggleAttribute("hidden", !dark);
  // 発光系テーマではグローエフェクトのCSSを有効化する
  document.documentElement.toggleAttribute("data-glow", !!theme.glow);
  themeBtn.title = t("themePrefix") + (doc.theme === "auto" ? "Auto (" + theme.name + ")" : theme.name);
  themeBtn.setAttribute("aria-label", t("themePrefix") + theme.name);
}

function renderTitle() {
  titleEl.textContent = doc.title;
}

function renderPath() {
  let p;
  if (location.protocol === "file:") {
    p = decodeURIComponent(location.pathname);
    if (/^\/[A-Za-z]:/.test(p)) p = p.slice(1);
  } else {
    p = location.href;
  }
  pathEl.textContent = p;
  pathEl.title = p;
}

function renderTabs() {
  tabsEl.innerHTML = "";
  doc.sheets.forEach((s, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "tab" + (i === doc.activeSheet ? " active" : "");
    b.dataset.i = i;
    b.textContent = s.name;
    b.title = t("tabTitle");
    tabsEl.appendChild(b);
  });
  const add = document.createElement("button");
  add.type = "button";
  add.className = "add-sheet";
  add.textContent = "＋";
  add.title = t("addSheetTitle");
  tabsEl.appendChild(add);
}

function render() {
  const hadFocus = table.contains(document.activeElement);
  const scrollTop = wrapEl.scrollTop;
  const scrollLeft = wrapEl.scrollLeft;
  const layout = computeLayout();
  colWidths = layout.colW;
  rowHeights = layout.heights;
  table.innerHTML = "";
  rowEls.clear();

  // table-layout: fixed 用の列幅。表自体の幅も明示しないと fixed が効かない
  const colgroup = document.createElement("colgroup");
  const headCol = document.createElement("col");
  headCol.style.width = rowHeadWidth() + "px";
  colgroup.appendChild(headCol);
  dataCols = colWidths.map(w => {
    const col = document.createElement("col");
    col.style.width = w + "px";
    colgroup.appendChild(col);
    return col;
  });
  const statCol = document.createElement("col");
  statCol.style.width = "30px";
  colgroup.appendChild(statCol);
  table.appendChild(colgroup);
  table.style.width = rowHeadWidth() + colWidths.reduce((a, b) => a + b, 0) + 30 + "px";

  const coordRow = document.createElement("tr");
  const corner = document.createElement("th");
  corner.className = "coord corner";
  coordRow.appendChild(corner);
  for (let c = 0; c < colCount(); c++) {
    const th = document.createElement("th");
    th.className = "coord col-head";
    th.dataset.c = c;
    th.textContent = colLetter(c);
    th.title = t("colMenuTitle");
    th.appendChild(makeHeadStatIcon("col", c));
    coordRow.appendChild(th);
  }
  const cornerTr = document.createElement("th");
  cornerTr.className = "coord corner-tr";
  coordRow.appendChild(cornerTr);
  table.appendChild(coordRow);

  topSpacer = spacerRow();
  botSpacer = spacerRow();
  table.appendChild(topSpacer);
  table.appendChild(botSpacer);

  // スペーサーで全高を先に確保してからスクロール位置を戻す。
  // 高さ0のままだと scrollTop の復元がクランプされて先頭に飛ぶ
  botSpacer.firstChild.style.height = rowTop(data.length) + "px";
  wrapEl.scrollTop = scrollTop;
  wrapEl.scrollLeft = scrollLeft;
  vStart = 0;
  vEnd = 0;
  updateWindow(true);
  refreshPinnedStats();

  if (hadFocus && activePos) {
    focusCell(activePos.r, activePos.c, "end");
  }
}

function applyLang() {
  [
    ["save-btn", "btnSave"],
    ["reload-btn", "btnReload"],
    ["undo-btn", "btnUndo"],
    ["redo-btn", "btnRedo"],
    ["addrow-btn", "btnAddRow"],
    ["addcol-btn", "btnAddCol"],
    ["export-btn", "btnExport"],
    ["help-btn", "btnHelp"],
    ["lang-btn", "btnLang"],
  ].forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.title = t(key);
    el.setAttribute("aria-label", t(key));
  });
  langBtn.textContent = effLang().toUpperCase();
  // ページ言語をUI言語に合わせ、ブラウザに翻訳を勧められないようにする
  document.documentElement.lang = effLang();
  titleEl.title = t("titleEdit");
  applyTheme();
  refreshStatus();
  renderTabs();
  render();
}

function setLang(lang) {
  if (doc.lang === lang) return;
  doc.lang = lang;
  markDirty();
  applyLang();
}

function syncDocUI() {
  syncData();
  renderTitle();
  applyLang();
}

function cellAt(r, c) {
  return table.querySelector('.cell[data-r="' + r + '"][data-c="' + c + '"]');
}

function focusCell(r, c, caret) {
  r = Math.min(Math.max(r, 0), data.length - 1);
  c = Math.min(Math.max(c, 0), colCount() - 1);
  let el = cellAt(r, c);
  if (!el) {
    // 仮想スクロールで未描画の行は、スクロールして描画してからフォーカスする
    wrapEl.scrollTop = Math.max(0, rowTop(r) - wrapEl.clientHeight / 2);
    updateWindow(true);
    el = cellAt(r, c);
    if (!el) return;
  }
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  if (caret === "end") range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function markDirty() {
  dirty = true;
  refreshStatus();
}

function refreshStatus() {
  if (toastTimer) {
    clearTimeout(toastTimer);
    toastTimer = null;
  }
  statusEl.classList.remove("ok", "warn");
  const base = FS_SUPPORTED ? (fileHandle ? t("target") + fileHandle.name : t("noTarget")) : "";
  statusEl.textContent = base + (dirty ? t("unsaved") : "");
  // 保存先が未設定の間は、クリックで保存の仕組みのヒントを表示できる
  // （ホバーのツールチップは編集の邪魔になるため出さない）
  statusEl.classList.toggle("hint", FS_SUPPORTED && !fileHandle);
  document.title = (dirty ? "● " : "") + doc.title;
}

function showToast(message, isWarn) {
  if (toastTimer) clearTimeout(toastTimer);
  statusEl.classList.remove("ok", "warn", "hint");
  statusEl.classList.add(isWarn ? "warn" : "ok");
  statusEl.textContent = message;
  toastTimer = setTimeout(() => {
    toastTimer = null;
    refreshStatus();
  }, 2500);
}

const UNDO_LIMIT = 100;

function pushUndoSnapshot(snapshot) {
  undoStack.push(snapshot);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack.length = 0;
}

function pushUndo() {
  pushUndoSnapshot(JSON.stringify(doc));
}

function undo() {
  hideMenu();
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(doc));
  doc = JSON.parse(undoStack.pop());
  syncDocUI();
  markDirty();
}

function redo() {
  hideMenu();
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(doc));
  doc = JSON.parse(redoStack.pop());
  syncDocUI();
  markDirty();
}

function insertRow(at) {
  pushUndo();
  data.splice(at, 0, Array(colCount()).fill(""));
  markDirty();
  render();
}

function deleteRow(at) {
  if (data.length <= 1) {
    showToast(t("lastRow"), true);
    return;
  }
  pushUndo();
  data.splice(at, 1);
  if (activePos && activePos.r >= data.length) activePos.r = data.length - 1;
  markDirty();
  render();
}

function insertCol(at) {
  pushUndo();
  data.forEach(row => row.splice(at, 0, ""));
  markDirty();
  render();
}

function deleteCol(at) {
  if (colCount() <= 1) {
    showToast(t("lastCol"), true);
    return;
  }
  pushUndo();
  data.forEach(row => row.splice(at, 1));
  if (activePos && activePos.c >= colCount()) activePos.c = colCount() - 1;
  markDirty();
  render();
}

function addRow() {
  insertRow(data.length);
}

function addCol() {
  insertCol(colCount());
}

function sheetName(base) {
  let n = doc.sheets.length + 1;
  let name = base + n;
  const names = doc.sheets.map(s => s.name);
  while (names.includes(name)) {
    n++;
    name = base + n;
  }
  return name;
}

function addSheet() {
  pushUndo();
  doc.sheets.push({
    name: sheetName("Sheet"),
    data: Array.from({ length: 4 }, () => ["", "", ""]),
  });
  doc.activeSheet = doc.sheets.length - 1;
  syncData();
  activePos = null;
  markDirty();
  renderTabs();
  render();
}

function switchSheet(i) {
  if (i === doc.activeSheet || i < 0 || i >= doc.sheets.length) return;
  doc.activeSheet = i;
  syncData();
  activePos = null;
  renderTabs();
  render();
}

// prompt() は埋め込みブラウザで抑止されることがあるため、タブ上で直接編集する
function startRenameSheet(i) {
  switchSheet(i);
  const tab = tabsEl.querySelector('.tab[data-i="' + i + '"]');
  if (!tab) return;
  const original = doc.sheets[i].name;
  tab.setAttribute("contenteditable", editMode);
  tab.focus();
  const range = document.createRange();
  range.selectNodeContents(tab);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  // blur が起きない環境でも確定できるよう、Enter/Escape でも直接 finish する
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    tab.removeAttribute("contenteditable");
    const name = tab.textContent.replace(/\n/g, " ").trim();
    if (name && name !== original) {
      pushUndo();
      doc.sheets[i].name = name;
      markDirty();
    }
    renderTabs();
  };

  tab.addEventListener("focusout", finish, { once: true });
  tab.addEventListener("keydown", e => {
    if (e.isComposing) return;
    if (e.key === "Enter") {
      e.preventDefault();
      tab.blur();
      finish();
    } else if (e.key === "Escape") {
      e.stopPropagation();
      tab.textContent = original;
      tab.blur();
      finish();
    }
  });
}

function deleteSheet(i) {
  if (doc.sheets.length <= 1) {
    showToast(t("lastSheet"), true);
    return;
  }
  pushUndo();
  doc.sheets.splice(i, 1);
  if (doc.activeSheet >= doc.sheets.length) doc.activeSheet = doc.sheets.length - 1;
  else if (doc.activeSheet > i) doc.activeSheet--;
  syncData();
  activePos = null;
  markDirty();
  renderTabs();
  render();
}

function moveSheet(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= doc.sheets.length) return;
  pushUndo();
  const [s] = doc.sheets.splice(i, 1);
  doc.sheets.splice(j, 0, s);
  if (doc.activeSheet === i) doc.activeSheet = j;
  else if (doc.activeSheet === j) doc.activeSheet = i;
  markDirty();
  renderTabs();
}

function showMenu(x, y, items) {
  if (!pinnedStat) hideStats();
  menuEl.innerHTML = "";
  items.forEach(([label, action]) => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = label;
    b.onclick = e => {
      e.stopPropagation();
      hideMenu();
      action();
    };
    menuEl.appendChild(b);
  });
  placePopover(menuEl, x, y);
}

function hideMenu() {
  menuEl.hidden = true;
}

// ポップオーバーを表示し、画面内に収まるよう位置を調整する。
// x / y に関数を渡すと、実測サイズを引数にして位置を計算できる
function placePopover(el, x, y) {
  el.hidden = false;
  const rect = el.getBoundingClientRect();
  const px = typeof x === "function" ? x(rect) : x;
  const py = typeof y === "function" ? y(rect) : y;
  el.style.left = Math.max(8, Math.min(px, window.innerWidth - rect.width - 8)) + "px";
  el.style.top = Math.max(8, Math.min(py, window.innerHeight - rect.height - 8)) + "px";
}

function hideStats() {
  statsPop.hidden = true;
  pinnedStat = null;
  refreshStatIcons();
}

function refreshStatIcons() {
  table.querySelectorAll(".stat-btn").forEach(btn => {
    const isCol = btn.dataset.c !== undefined;
    const active = !!pinnedStat &&
      ((isCol && pinnedStat.kind === "col" && Number(btn.dataset.c) === pinnedStat.index) ||
       (!isCol && pinnedStat.kind === "row" && Number(btn.dataset.r) === pinnedStat.index));
    btn.classList.toggle("active", active);
  });
}

function showStatsForBtn(btn) {
  const rect = btn.getBoundingClientRect();
  if (btn.dataset.c !== undefined) {
    showColStats(Number(btn.dataset.c), rect.left, rect.bottom + 6);
  } else {
    showRowStats(Number(btn.dataset.r), rect.right + 6, rect.top);
  }
}

// 固定中の集計を最新データ・最新レイアウトに追従させる
function refreshPinnedStats() {
  if (!pinnedStat) return;
  const { kind, index } = pinnedStat;
  if (kind === "col" ? index >= colCount() : index >= data.length) {
    hideStats();
    return;
  }
  const selector = kind === "col"
    ? '.col-head[data-c="' + index + '"] .head-stat'
    : (pinnedStat.side === "head"
        ? '.row-head[data-r="' + index + '"] .head-stat'
        : '.stat-row-btn[data-r="' + index + '"]');
  const btn = table.querySelector(selector);
  if (!btn) {
    hideStats();
    return;
  }
  showStatsForBtn(btn);
}

function parseNumeric(value) {
  const cleaned = value.trim().replace(/,/g, "");
  if (cleaned === "") return null;
  const n = Number(cleaned);
  return isNaN(n) ? null : n;
}

function formatNum(n) {
  return Number.isInteger(n)
    ? n.toLocaleString()
    : n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

// クイック統計: その場で計算して表示するだけで、セルには何も書き込まない
function showStats(x, y, label, values) {
  const nums = [];
  let excluded = 0;
  values.forEach(v => {
    if (v.trim() === "") return;
    const n = parseNumeric(v);
    if (n === null) excluded++;
    else nums.push(n);
  });

  statsPop.innerHTML = "";
  const heading = document.createElement("b");
  heading.textContent = label;
  statsPop.appendChild(heading);

  const addRow = (name, value) => {
    const row = document.createElement("div");
    row.className = "stat-row";
    const k = document.createElement("span");
    k.textContent = name;
    const v = document.createElement("span");
    v.textContent = value;
    row.appendChild(k);
    row.appendChild(v);
    statsPop.appendChild(row);
  };

  if (!nums.length) {
    const empty = document.createElement("div");
    empty.textContent = t("statsNoNumbers");
    statsPop.appendChild(empty);
  } else {
    const sum = nums.reduce((a, b) => a + b, 0);
    addRow(t("statsCount"), String(nums.length));
    if (excluded) addRow(t("statsExcluded"), String(excluded));
    addRow(t("statsSum"), formatNum(sum));
    addRow(t("statsAvg"), formatNum(sum / nums.length));
    addRow(t("statsMax"), formatNum(Math.max(...nums)));
    addRow(t("statsMin"), formatNum(Math.min(...nums)));
  }

  placePopover(statsPop, x, y);
}

function showColStats(c, x, y) {
  const label = (data[0][c] || "").trim() || colLetter(c);
  showStats(x, y, label, data.slice(1).map(row => row[c]));
}

function showRowStats(r, x, y) {
  showStats(x, y, t("statsRow") + (r + 1), data[r]);
}

function headMenuHandler(e) {
  if (e.target.closest(".stat-btn")) return;
  const rowHead = e.target.closest("th.row-head");
  const colHead = e.target.closest("th.col-head");
  if (!rowHead && !colHead) return;
  e.preventDefault();
  e.stopPropagation();
  if (rowHead) {
    const r = Number(rowHead.dataset.r);
    showMenu(e.clientX, e.clientY, [
      [t("insRowAbove"), () => insertRow(r)],
      [t("insRowBelow"), () => insertRow(r + 1)],
      [t("delRow"), () => deleteRow(r)],
    ]);
  } else {
    const c = Number(colHead.dataset.c);
    showMenu(e.clientX, e.clientY, [
      [t("insColLeft"), () => insertCol(c)],
      [t("insColRight"), () => insertCol(c + 1)],
      [t("delCol"), () => deleteCol(c)],
    ]);
  }
}

function caretInfo(cell) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  if (!cell.contains(range.startContainer)) return null;
  if (!sel.isCollapsed) {
    // セル全体の選択（ナビゲーションでの select-all）だけセル移動を許可し、
    // 部分選択はブラウザ標準のキャレット操作に任せる
    if (sel.toString() === cell.textContent && cell.textContent !== "") {
      return { atStart: true, atEnd: true, onFirstLine: true, onLastLine: true };
    }
    return null;
  }
  const pre = range.cloneRange();
  pre.selectNodeContents(cell);
  pre.setEnd(range.startContainer, range.startOffset);
  const offset = pre.toString().length;
  const text = cell.textContent;
  return {
    atStart: offset === 0,
    atEnd: offset === text.length,
    onFirstLine: !text.slice(0, offset).includes("\n"),
    onLastLine: !text.slice(offset).includes("\n"),
  };
}

  const tr = cell.parentElement;

// 入力中は列幅を広げる方向だけ即時反映する（縮む方向は次の render() に任せる）
function autoGrowCol(c, value) {
  const col = dataCols[c];
  if (!col || colWidths[c] >= COL_MAX) return;
  measureCtx.font = cellFont();
  const needed = Math.min(COL_MAX, Math.max(COL_MIN, Math.ceil(textWidth(value)) + 20));
  if (needed > colWidths[c]) {
    colWidths[c] = needed;
    col.style.width = needed + "px";
    table.style.width = rowHeadWidth() + colWidths.reduce((a, b) => a + b, 0) + 30 + "px";
  }
}

table.addEventListener("keydown", e => {
  if (e.isComposing) return;
  const cell = e.target.closest(".cell");
  if (!cell) return;
  const r = Number(cell.dataset.r);
  const c = Number(cell.dataset.c);

  if (e.key === "Enter") {
    if (e.altKey) {
      e.preventDefault();
      document.execCommand("insertText", false, "\n");
      return;
    }
    e.preventDefault();
    if (e.shiftKey) {
      focusCell(r - 1, c);
    } else if (r === data.length - 1) {
      insertRow(data.length);
      focusCell(r + 1, c);
    } else {
      focusCell(r + 1, c);
    }
    return;
  }

  if (e.key === "Tab") {
    // 端のセルでは preventDefault せず、フォーカスが表の外へ出られるようにする
    if (e.shiftKey) {
      if (c > 0) { e.preventDefault(); focusCell(r, c - 1); }
      else if (r > 0) { e.preventDefault(); focusCell(r - 1, colCount() - 1); }
    } else {
      if (c < colCount() - 1) { e.preventDefault(); focusCell(r, c + 1); }
      else if (r < data.length - 1) { e.preventDefault(); focusCell(r + 1, 0); }
    }
    return;
  }

  if (e.key.startsWith("Arrow")) {
    if (e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) return;
    const info = caretInfo(cell);
    if (!info) return;
    if (e.key === "ArrowUp" && info.onFirstLine && r > 0) {
      e.preventDefault();
      focusCell(r - 1, c);
    } else if (e.key === "ArrowDown" && info.onLastLine && r < data.length - 1) {
      e.preventDefault();
      focusCell(r + 1, c);
    } else if (e.key === "ArrowLeft" && info.atStart && c > 0) {
      e.preventDefault();
      focusCell(r, c - 1);
    } else if (e.key === "ArrowRight" && info.atEnd && c < colCount() - 1) {
      e.preventDefault();
      focusCell(r, c + 1);
    }
  }
});

// Excel / Google スプレッドシートは改行を含むセルを二重引用符で囲んでコピーする
// （"" は " に復元）ため、引用符付きフィールドを解釈して分割する
function parseTsv(text) {
  text = text.replace(/\r\n?/g, "\n");
  const rows = [];
  let row = [];
  let field = "";
  let started = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (!started && ch === '"') {
      started = true;
      i++;
      while (i < text.length) {
        if (text[i] === '"') {
          if (text[i + 1] === '"') {
            field += '"';
            i += 2;
          } else {
            i++;
            break;
          }
        } else {
          field += text[i++];
        }
      }
      continue;
    }
    if (ch === "\t") {
      row.push(field);
      field = "";
      started = false;
      i++;
    } else if (ch === "\n") {
      row.push(field);
      rows.push(row);
      row = [];
      field = "";
      started = false;
      i++;
    } else {
      field += ch;
      started = true;
      i++;
    }
  }
  row.push(field);
  rows.push(row);
  if (rows.length > 1 && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === "") {
    rows.pop();
  }
  return rows;
}

table.addEventListener("paste", e => {
  const cell = e.target.closest(".cell");
  if (!cell || !e.clipboardData) return;
  const text = e.clipboardData.getData("text/plain");
  if (!/[\t\r\n]/.test(text)) return;
  e.preventDefault();
  pushUndo();
  const grid = parseTsv(text);
  const r0 = Number(cell.dataset.r);
  const c0 = Number(cell.dataset.c);
  const needCols = Math.max(colCount(), c0 + Math.max(...grid.map(g => g.length)));
  while (data.length < r0 + grid.length) data.push(Array(colCount()).fill(""));
  data.forEach(row => {
    while (row.length < needCols) row.push("");
  });
  grid.forEach((g, i) => g.forEach((v, j) => {
    data[r0 + i][c0 + j] = v;
  }));
  markDirty();
  render();
  focusCell(r0, c0, "end");
});

// ドラッグ&ドロップでもハンドルを取得できる（ピッカーを経由しない許可経路）。
// 未保存の編集があるときはデータを保持したまま保存先の設定のみ行う
const dropOverlay = document.getElementById("drop-overlay");
let dropHideTimer = null;

window.addEventListener("dragover", e => {
  if (e.dataTransfer && [...e.dataTransfer.items].some(item => item.kind === "file")) {
    e.preventDefault();
    dropOverlay.querySelector(".drop-box").textContent = t("dropHint");
    dropOverlay.hidden = false;
    // dragover はホバー中連続発火するため、途切れたら少し後に隠す
    if (dropHideTimer) clearTimeout(dropHideTimer);
    dropHideTimer = setTimeout(() => { dropOverlay.hidden = true; }, 200);
  }
});

window.addEventListener("drop", e => {
  dropOverlay.hidden = true;
  if (!e.dataTransfer) return;
  const item = [...e.dataTransfer.items].find(it => it.kind === "file");
  if (!item) return;
  e.preventDefault();
  if (!item.getAsFileSystemHandle) return;
  const handlePromise = item.getAsFileSystemHandle();
  (async () => {
    try {
      const handle = await handlePromise;
      if (!handle || handle.kind !== "file" || !/\.html?$/i.test(handle.name)) return;
      // ドロップの意味は「開く」の一義に固定。編集中は必ず破棄確認を挟む
      if (dirty && !confirm(t("confirmDropDirty"))) return;
      if (!(await adoptHandle(handle, true))) return;
      await persistHandle(handle);
      showToast(t("toastLoaded") + handle.name);
    } catch (error) {
      alert(t("loadFail") + error.message);
    }
  })();
});

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = () => {
      request.result.createObjectStore(DB_STORE);
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveStoredHandle(handle) {
  const db = await openHandleDB();

  await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(handle, HANDLE_KEY);
    // 次回ピッカーの初期フォルダ用に、URLに依らない「最後に選んだハンドル」も控える
    tx.objectStore(DB_STORE).put(handle, LAST_HANDLE_KEY);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });

  db.close();
}

async function loadStoredHandle(key) {
  const db = await openHandleDB();

  const handle = await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const request = tx.objectStore(DB_STORE).get(key || HANDLE_KEY);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error);
  });

  db.close();
  return handle;
}

async function persistHandle(handle) {
  try {
    await saveStoredHandle(handle);
  } catch (error) {
    console.warn("failed to persist save target handle", error);
  }
}

async function verifyWritePermission(handle) {
  if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") {
    return true;
  }

  return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
}

async function extractSheetJson(handle) {
  const file = await handle.getFile();
  const text = await file.text();
  const match = text.match(SHEET_DATA_RE);
  if (!match) {
    alert(t("noBlockInFile"));
    return null;
  }
  // ディスク側は CRLF の可能性があるため LF に正規化して比較の土台を揃える
  return match[1].replace(/\r\n?/g, "\n").trim();
}

async function adoptHandle(handle, loadData) {
  const rawJson = await extractSheetJson(handle);
  if (rawJson === null) return false;

  if (loadData) {
    try {
      doc = normalizeDoc(JSON.parse(rawJson));
      dirty = false;
      undoStack.length = 0;
      redoStack.length = 0;
      activePos = null;
      syncDocUI();
    } catch (error) {
      if (!confirm(t("brokenJsonAdopt1") + error.message + t("brokenJsonAdopt2"))) {
        return false;
      }
    }
  }

  fileHandle = handle;
  lastLoadedJson = rawJson;
  refreshStatus();
  return true;
}

// パス文字列からピッカーへ直接パスを渡すことはAPI仕様上できないため、
// 自分のパスから既知フォルダを推測して初期フォルダだけ合わせる
function pickerStartIn() {
  if (location.protocol !== "file:") return null;
  const p = decodeURIComponent(location.pathname).toLowerCase();
  if (p.includes("/downloads/")) return "downloads";
  if (p.includes("/desktop/")) return "desktop";
  if (p.includes("/documents/")) return "documents";
  return null;
}

async function pickFile() {
  if (!window.showOpenFilePicker) {
    alert(t("noFsApi"));
    return null;
  }
  try {
    const options = {
      id: "one-file-sheet",
      types: [{
        description: "HTML File",
        accept: { "text/html": [".html"] }
      }]
    };
    // 初期フォルダの優先順: 現在の保存先 > このファイルの記録 > 最後に選んだファイル
    // > パスから推測した既知フォルダ。ハンドルを渡すとそのファイルのフォルダで開く
    let anchor = fileHandle;
    if (!anchor) {
      try {
        anchor = (await loadStoredHandle(HANDLE_KEY)) || (await loadStoredHandle(LAST_HANDLE_KEY));
      } catch (error) {
        anchor = null;
      }
    }
    const startIn = anchor || pickerStartIn();
    if (startIn) options.startIn = startIn;
    const [handle] = await window.showOpenFilePicker(options);
    return handle;
  } catch (error) {
    if (error && error.name === "AbortError") return null;
    alert(t("pickFail") + error.message);
    return null;
  }
}

// 初回保存時に呼ばれる: 現在の編集内容を保持したまま保存先を設定する。
// 通常は自分自身を選ぶ想定のため、選んだファイルの中身が読み込み元と
// 異なるとき（別ファイルを選んだ・外部で編集された）だけ確認を挟む
async function pickSaveTarget() {
  const handle = await pickFile();
  if (!handle) return false;

  const baseline = lastLoadedJson;
  try {
    if (!(await adoptHandle(handle, false))) return false;
  } catch (error) {
    alert(t("loadFail") + error.message);
    return false;
  }

  if (baseline !== null && lastLoadedJson !== baseline) {
    if (!confirm(t("confirmTargetDiffers"))) {
      fileHandle = null;
      lastLoadedJson = baseline;
      refreshStatus();
      return false;
    }
  }

  await persistHandle(handle);
  return true;
}

async function reloadFromFile() {
  if (!fileHandle) {
    alert(t("reloadNoTarget"));
    return;
  }
  if (dirty && !confirm(t("confirmDiscardReload"))) {
    return;
  }
  try {
    if ((await fileHandle.queryPermission({ mode: "read" })) !== "granted" &&
        (await fileHandle.requestPermission({ mode: "read" })) !== "granted") {
      alert(t("noReadPerm"));
      return;
    }
    if (await adoptHandle(fileHandle, true)) {
      showToast(t("toastReloaded") + fileHandle.name);
    }
  } catch (error) {
    alert(t("reloadFail") + error.message + t("checkFileMoved"));
  }
}

async function saveToSameFile() {
  if (saving) return;
  if (!FS_SUPPORTED) {
    exportHtml();
    dirty = false;
    refreshStatus();
    showToast(t("toastSaveExported"));
    return;
  }
  if (!fileHandle) {
    // 保存先が未設定なら、その場でファイルを選んでそのまま保存まで進む
    if (!(await pickSaveTarget())) return;
  }

  saving = true;
  try {
    if (!(await verifyWritePermission(fileHandle))) {
      alert(t("noWritePerm"));
      return;
    }

    const file = await fileHandle.getFile();
    const html = await file.text();

    const match = html.match(SHEET_DATA_RE);
    if (!match) {
      alert(t("saveNoBlock"));
      return;
    }

    const diskJson = match[1].replace(/\r\n?/g, "\n").trim();
    if (lastLoadedJson === null) {
      if (!confirm(t("confirmNullBaseline"))) {
        return;
      }
    } else if (diskJson !== lastLoadedJson) {
      if (!confirm(t("confirmConflict"))) {
        return;
      }
    }

    const serialized = serializeDoc();
    // 置換文字列中の $ が特殊解釈されないよう、関数で渡す
    const updated = html.replace(SHEET_DATA_RE, () => serialized.block);

    const writable = await fileHandle.createWritable();
    await writable.write(updated);
    await writable.close();

    lastLoadedJson = serialized.json;
    dirty = false;
    refreshStatus();
    showToast(t("toastSaved") + fileHandle.name);
  } catch (error) {
    alert(t("saveFail1") + error.message + t("saveFail2"));
  } finally {
    saving = false;
  }
}

function sanitizeName(name) {
  return name.replace(/[\\/:*?"<>|]/g, "_");
}

function downloadBlob(blob, filename) {
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function exportCsv() {
  const escapeCsv = value => (/[",\r\n]/.test(value) ? '"' + value.replace(/"/g, '""') + '"' : value);
  const csv = "\uFEFF" + data.map(row => row.map(escapeCsv).join(",")).join("\r\n") + "\r\n";
  const base = fileHandle ? fileHandle.name.replace(/\.html?$/i, "") : doc.title;
  const sheet = doc.sheets[doc.activeSheet].name;
  downloadBlob(new Blob([csv], { type: "text/csv" }), sanitizeName(base + "_" + sheet) + ".csv");
  showToast(t("toastCsv") + sheet);
}

// "<" を \u003c にエスケープし、セル内に閉じタグ相当の文字列があってもブロックが壊れないようにする
function serializeDoc() {
  const json = JSON.stringify(doc, null, 2).replace(/</g, "\\u003c");
  return { json: json, block: OPEN_TAG + "\n" + json + "\n" + CLOSE_TAG };
}

// 起動時の素のHTMLに現在のドキュメントを差し込んだ「自分自身の複製」を作る。
// File System Access API に非対応のブラウザやデモページでも保存手段になる
function buildExportHtml() {
  return BOOT_HTML.replace(SHEET_DATA_RE, () => serializeDoc().block);
}

function exportHtml() {
  downloadBlob(new Blob([buildExportHtml()], { type: "text/html" }), sanitizeName(doc.title || "OneFileSheet") + ".html");
  showToast(t("toastHtml"));
}

document.getElementById("export-btn").addEventListener("click", e => {
  e.stopPropagation();
  hideHelp();
  hideThemePop();
  const rect = e.currentTarget.getBoundingClientRect();
  showMenu(rect.left, rect.bottom + 6, [
    [t("exportHtmlItem"), exportHtml],
    [t("exportCsvItem"), exportCsv],
  ]);
});

langBtn.addEventListener("click", e => {
  e.stopPropagation();
  hideHelp();
  hideThemePop();
  const rect = e.currentTarget.getBoundingClientRect();
  showMenu(rect.left, rect.bottom + 6, [
    [t("langAuto"), () => setLang("auto")],
    ["English", () => setLang("en")],
    ["日本語", () => setLang("ja")],
  ]);
});

async function initialize() {
  renderPath();
  syncDocUI();
  refreshStatus();

  if (!FS_SUPPORTED) {
    // 直接保存できない環境では再読み込みボタンは意味を持たない
    document.getElementById("reload-btn").hidden = true;
    return;
  }
  if (!window.indexedDB) {
    return;
  }

  try {
    fileHandle = await loadStoredHandle();
    refreshStatus();
  } catch (error) {
    console.warn("failed to restore save target handle", error);
  }
}

initialize();
</script>
